<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Watch</title>
    <script src="https://unpkg.com/lightweight-charts@4.2.2/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(140deg, #0f172a, #111827);
            min-height: 100vh;
            padding: 18px;
            color: #e5e7eb;
        }
        .container { max-width: 1500px; margin: 0 auto; }
        .topnav { display: flex; gap: 10px; margin-bottom: 14px; }
        .nav-link { text-decoration: none; color: #fff; background: #334155; padding: 8px 12px; border-radius: 8px; }
        .nav-link.active { background: #2563eb; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
        .market-pill { background: rgba(255,255,255,0.14); padding: 8px 12px; border-radius: 18px; }

        .card { background: #ffffff; color: #0f172a; border-radius: 12px; box-shadow: 0 8px 18px rgba(0,0,0,0.16); }
        .search-card { padding: 12px; margin-bottom: 12px; position: relative; }
        .search-box { width: 100%; border: 1px solid #cbd5e1; border-radius: 8px; padding: 10px 12px; font-size: 0.95em; }
        .suggestions { position: absolute; top: 54px; left: 12px; right: 12px; max-height: 500px; overflow-y: auto; border: 1px solid #d1d5db; border-radius: 8px; background: #fff; display: none; z-index: 30; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .item { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; line-height: 1.4; }
        .item:last-child { border-bottom: none; }
        .item:hover, .item.active { background: #eff6ff; }
        .sym { font-weight: 700; color: #0f172a; }
        .meta { font-size: 0.83em; color: #64748b; }

        .layout { display: grid; grid-template-columns: 280px 1fr; gap: 12px; transition: grid-template-columns 0.2s ease; }
        .layout.watch-collapsed { grid-template-columns: 48px 1fr; }
        .watch-card { padding: 14px; }
        .watch-card.collapsed { padding: 10px 6px; }
        .watch-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; gap: 8px; }
        .collapse-btn { border: 1px solid #cbd5e1; background: #fff; color: #0f172a; border-radius: 8px; padding: 6px 8px; cursor: pointer; }
        .watch-card.collapsed .watch-title-text,
        .watch-card.collapsed .watchlist { display: none; }
        .watch-card.collapsed .watch-header { justify-content: center; }
        .watchlist { border: 1px solid #e2e8f0; border-radius: 10px; max-height: 760px; overflow-y: auto; }
        .witem { display: flex; justify-content: space-between; gap: 8px; padding: 10px 12px; border-bottom: 1px solid #f1f5f9; cursor: pointer; }
        .witem:last-child { border-bottom: none; }
        .witem.active { background: #eef2ff; }
        .witem:hover { background: #f8fafc; }

        .chart-card { padding: 14px; }
        .chart-head { display: flex; justify-content: space-between; align-items: start; gap: 14px; flex-wrap: wrap; margin-bottom: 10px; }
        .title { font-size: 1.35em; font-weight: 700; color: #0f172a; }
        .price { font-size: 1.15em; font-weight: 700; }
        .sub { color: #64748b; margin-top: 4px; }
        .positive { color: #16a34a; }
        .negative { color: #dc2626; }

        .toolbar, .indicator-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: 10px;
        }
        .inline-label {
            font-size: 0.83em;
            color: #475569;
            font-weight: 600;
        }
        .tool-btn, .tool-select, .tool-input {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            background: #fff;
            padding: 7px 10px;
            font-size: 0.9em;
        }
        .tool-btn {
            cursor: pointer;
            color: #0f172a;
        }
        .tool-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
        .tool-btn.ghost { background: #f8fafc; }
        .indicator-row {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
            padding: 8px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #f8fafc;
        }
        .indicator-label { font-weight: 700; min-width: 60px; }
        .toggle-btn {
            border: none;
            background: #0f172a;
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        .remove-btn {
            border: none;
            background: #dc2626;
            color: #fff;
            padding: 6px 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        .chart-shell {
            position: relative;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            overflow: hidden;
        }
        .chart-hover-tools {
            position: absolute;
            left: 50%;
            bottom: 10px;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            align-items: center;
            padding: 6px 8px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.78);
            box-shadow: 0 8px 24px rgba(2, 6, 23, 0.3);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease;
            z-index: 20;
        }
        .chart-shell:hover .chart-hover-tools {
            opacity: 1;
            pointer-events: auto;
        }
        .chart-hover-btn {
            border: 1px solid rgba(255, 255, 255, 0.28);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.06);
            color: #f8fafc;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.84em;
        }
        .chart-hover-btn:hover {
            background: rgba(255, 255, 255, 0.16);
        }
        #ohlcTooltip {
            position: absolute;
            top: 0; left: 0;
            display: none;
            background: rgba(15, 23, 42, 0.92);
            color: #f8fafc;
            padding: 7px 11px;
            border-radius: 8px;
            font-size: 0.78em;
            pointer-events: none;
            z-index: 25;
            white-space: nowrap;
            line-height: 1.85;
            border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        }
        #ohlcTooltip .ohlc-time { color: #94a3b8; font-size: 0.9em; margin-bottom: 1px; }
        #ohlcTooltip .ohlc-h { color: #4ade80; }
        #ohlcTooltip .ohlc-l { color: #f87171; }
        #ohlcTooltip span { margin-right: 8px; }
        .dyn-pane { height: 120px; border-top: 1px solid #e2e8f0; }
        .tool-btn.ohlc-on  { background: #16a34a; color: #fff; border-color: #16a34a; }
        .tool-btn.ohlc-off { background: #f1f5f9; color: #475569; }
        #indicatorBadges {
            position: absolute;
            top: 6px; left: 6px;
            display: flex; flex-wrap: wrap; gap: 4px;
            z-index: 16; pointer-events: auto;
        }
        .ind-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: rgba(15,23,42,0.72);
            color: #e2e8f0;
            font-size: 0.7em;
            padding: 2px 7px 2px 5px;
            border-radius: 4px;
            cursor: pointer;
            user-select: none;
            border: 1px solid rgba(255,255,255,0.12);
            transition: background 0.12s;
        }
        .ind-badge:hover { background: rgba(15,23,42,0.95); }
        .ind-badge .bd-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .ind-badge.bd-hidden { opacity: 0.45; }
        #indicatorPopup {
            display: none;
            position: absolute;
            z-index: 40;
            background: #1e293b;
            color: #e2e8f0;
            border-radius: 10px;
            padding: 14px 16px;
            min-width: 250px;
            max-width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 0.84em;
        }
        #indicatorPopup h4 { margin-bottom: 10px; font-size: 1em; color: #94a3b8; }
        #indicatorPopup label { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; flex-wrap: wrap; }
        #indicatorPopup input[type=number], #indicatorPopup select { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 5px; padding: 4px 6px; width: 82px; }
        #indicatorPopup input[type=color] { width: 38px; height: 24px; padding: 1px; border-radius: 4px; border: 1px solid #334155; background: #0f172a; cursor: pointer; }
        #indicatorPopup select { width: auto; }
        .popup-actions { display: flex; gap: 6px; margin-top: 10px; }
        .popup-btn { padding: 5px 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.82em; }
        .popup-btn.del { background: #dc2626; color: #fff; }
        .popup-btn.vis { background: #334155; color: #e2e8f0; }
        .popup-btn.cls { background: #475569; color: #fff; margin-left: auto; }
        #candleChart { height: 460px; }
        #rsiChart { height: 160px; border-top: 1px solid #e2e8f0; display: none; }
        #macdChart { height: 180px; border-top: 1px solid #e2e8f0; display: none; }
        .note { color: #64748b; font-size: 0.86em; }

        @media (max-width: 1100px) {
            .layout { grid-template-columns: 1fr; }
            .watchlist { max-height: 260px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="topnav">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link active" href="/market-watch">Market Watch</a>
            <a class="nav-link" href="/token-refresh" style="background:#7f1d1d;color:#fecaca">🔐 Token</a>
        </div>

        <div class="header">
            <div>
                <h1>Market Watch</h1>
                <div>Dedicated chart page with historical candles and indicators</div>
            </div>
            <div class="market-pill" id="marketStatus">Checking market status...</div>
        </div>

        <div class="card search-card">
            <input class="search-box" id="searchInput" type="text" autocomplete="off" placeholder="Search stock (e.g., INFY, TCS, RELIANCE)" />
            <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="layout">
            <div class="card watch-card">
                <div class="watch-header">
                    <h3 class="watch-title-text">Watchlist</h3>
                    <button class="collapse-btn" id="toggleWatchlistBtn" title="Hide or show watchlist">&#9776;</button>
                </div>
                <div class="watchlist" id="watchlistBox"></div>
            </div>

            <div class="card chart-card">
                <div class="chart-head">
                    <div>
                        <div class="title" id="selectedSymbol">Select a stock</div>
                        <div class="sub" id="selectedMeta">Historical candles render even when market is closed.</div>
                    </div>
                    <div class="price" id="selectedPrice">--</div>
                </div>

                <div id="strategyPanel" style="padding: 12px; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-radius: 8px; margin: 8px 0; border: 1px solid #334155; display: none;">
                    <div id="strategyPanelTitle" style="font-size: 0.85em; color: #94a3b8; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Strategy Signal</div>
                    <div id="strategySignal" style="font-size: 1.5em; font-weight: bold; color: #0f172a; margin: 8px 0;">--</div>
                    <div id="signalStrength" style="font-size: 0.9em; color: #cbd5e1; margin: 4px 0;">--</div>
                    <div id="signalReason" style="font-size: 0.85em; color: #94a3b8; margin-top: 8px; line-height: 1.4;">--</div>
                    <div id="signalDetails" style="font-size: 0.82em; color: #94a3b8; margin-top: 6px; line-height: 1.7; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 6px; display: none;"></div>
                </div>

                <div class="toolbar">
                    <span class="inline-label">Interval</span>
                    <select class="tool-select" id="intervalSelect" title="Candle interval">
                        <option value="minute">1 Minute</option>
                        <option value="3minute">3 Minutes</option>
                        <option value="5minute">5 Minutes</option>
                        <option value="15minute">15 Minutes</option>
                        <option value="30minute">30 Minutes</option>
                        <option value="60minute">1 Hour</option>
                        <option value="day">1 Day</option>
                    </select>

                    <button class="tool-btn ohlc-on" id="ohlcToggleBtn" title="Toggle OHLC tooltip">OHLC</button>
                    <span class="inline-label">Indicator</span>
                    <select class="tool-select" id="indicatorType">
                        <option value="EMA">EMA</option>
                        <option value="SMA">SMA</option>
                        <option value="RSI">RSI</option>
                        <option value="MACD">MACD</option>
                        <option value="VWAP">VWAP</option>
                        <option value="VWAP_AI">VWAP AI (Options Strategy)</option>
                        <option value="Bollinger">Bollinger Bands</option>
                        <option value="Supertrend">Supertrend</option>
                        <option value="Trade">Trade (Entry/Exit/SL)</option>
                        <optgroup label="── Momentum ──">
                            <option value="ADX">ADX (Avg Directional Index)</option>
                            <option value="ROC">ROC (Rate of Change)</option>
                            <option value="Stochastic">Stochastic (%K/%D)</option>
                        </optgroup>
                        <optgroup label="── Trend ──">
                            <option value="ParabolicSAR">Parabolic SAR</option>
                        </optgroup>
                        <optgroup label="── Volume ──">
                            <option value="OBV">OBV (On Balance Volume)</option>
                            <option value="VPT">VPT (Volume Price Trend)</option>
                            <option value="MFI">MFI (Money Flow Index)</option>
                            <option value="CMF">CMF (Chaikin Money Flow)</option>
                            <option value="ADLine">A/D Line (Accum./Distribution)</option>
                            <option value="EOM">EOM (Ease of Movement)</option>
                        </optgroup>
                        <optgroup label="── Volatility ──">
                            <option value="Keltner">Keltner Channel</option>
                            <option value="Donchian">Donchian Channel</option>
                            <option value="ATR">ATR (Avg True Range)</option>
                        </optgroup>
                    </select>
                    <button class="tool-btn" id="addIndicatorBtn">Add Indicator</button>
                </div>

                <div id="indicatorList" style="display:none"></div>

                <div class="chart-shell">
                    <div id="candleChart"></div>
                    <div id="rsiChart"></div>
                    <div id="macdChart"></div>
                    <div id="dynamicPanesContainer"></div>
                    <div id="indicatorBadges"></div>
                    <div id="indicatorPopup"></div>
                    <div id="ohlcTooltip"></div>
                    <div class="chart-hover-tools" id="chartHoverTools">
                        <button class="chart-hover-btn" id="zoomInBtn" title="Zoom In">Zoom In +</button>
                        <button class="chart-hover-btn" id="zoomOutBtn" title="Zoom Out">Zoom Out -</button>
                        <button class="chart-hover-btn" id="fullscreenChartBtn" title="Toggle fullscreen chart">Full Screen</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/api';
        const STORAGE_KEY = 'market_watch_state_v2';

        let suggestions = [];
        let activeIndex = -1;
        let debounceTimer = null;

        let watchlist = [];
        let selectedItem = null;
        let watchlistCollapsed = false;
        let currentInterval = 'minute';
        let candleData = [];
        let loadingOlderHistory = false;
        let noMoreOlderHistory = false;
        let lazyLoadDebounceTimer = null;
        let historyRangeSteps = [];
        let historyRangeIndex = 0;

        let indicators = [];
        let lastVWAPAISignals = [];

        let mainChart;
        let candleSeries;
        let overlaySeries = [];
        let rsiChart;
        let rsiSeries;
        let macdChart;
        let macdSeries;
        let macdSignalSeries;
        let macdHistogramSeries;
        let quotePollTimer = null;
        let liveStream = null;
        let liveStreamState = 'disconnected';
        let chartShellEl = null;
        let ohlcEnabled = true;
        let dynamicPaneCharts = {};
        let allSubCharts = [];
        let tradeSignalMap = new Map();
        let syncingTimeScale = false;
        let activePopupId = null; // epoch -> { kind, side, entry, stop, target, exitReason, exitPrice }

        function pad2(value) {
            return String(value).padStart(2, '0');
        }

        function saveState() {
            const serializable = {
                watchlist,
                watchlistCollapsed,
                selectedKey: selectedItem ? selectedItem.key : null,
                currentInterval,
                indicators
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(serializable));
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return;
                const data = JSON.parse(raw);
                watchlist = data.watchlist || [];
                watchlistCollapsed = Boolean(data.watchlistCollapsed);
                currentInterval = data.currentInterval || 'minute';
                indicators = Array.isArray(data.indicators) ? data.indicators : indicators;
                if (data.selectedKey) {
                    selectedItem = watchlist.find((w) => w.key === data.selectedKey) || null;
                }
            } catch (_e) {
            }
        }

        function isIndianMarketOpen(now = new Date()) {
            const parts = new Intl.DateTimeFormat('en-GB', {
                timeZone: 'Asia/Kolkata',
                weekday: 'short',
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            }).formatToParts(now);
            const day = parts.find((p) => p.type === 'weekday').value;
            const hh = Number(parts.find((p) => p.type === 'hour').value);
            const mm = Number(parts.find((p) => p.type === 'minute').value);
            const minutes = hh * 60 + mm;
            return day !== 'Sat' && day !== 'Sun' && minutes >= 555 && minutes <= 930;
        }

        function updateMarketPill() {
            const el = document.getElementById('marketStatus');
            const open = isIndianMarketOpen();
            const streamText = liveStreamState === 'connected'
                ? 'Live stream connected'
                : liveStreamState === 'connecting'
                    ? 'Connecting live stream...'
                    : liveStreamState === 'reconnecting'
                        ? 'Live stream reconnecting...'
                        : 'Live stream idle';
            el.textContent = `${open ? 'Indian Market: OPEN (09:15 - 15:30 IST)' : 'Indian Market: CLOSED'} | ${streamText}`;
            el.style.color = open ? '#16a34a' : '#dc2626';
        }

        // ── Token-expired banner ──────────────────────────────────────────────────
        async function checkTokenAndShowBanner() {
            try {
                const r = await fetch(`${API_URL}/token-status`);
                const d = await r.json();
                if (!d.valid) showTokenExpiredBanner();
            } catch (_) {}
        }
        function showTokenExpiredBanner() {
            if (document.getElementById('mwTokenBanner')) return;
            const b = document.createElement('div');
            b.id = 'mwTokenBanner';
            b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#7f1d1d;color:#fecaca;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:.93em;box-shadow:0 2px 12px rgba(0,0,0,.4)';
            b.innerHTML = `<span>⚠️ <strong>Zerodha access token expired.</strong> Charts and quotes will not load.</span>
                <a href="/token-refresh" style="background:#dc2626;color:#fff;padding:8px 18px;border-radius:8px;text-decoration:none;font-weight:700;white-space:nowrap">🔐 Refresh Token</a>`;
            document.body.prepend(b);
        }

        function getIntervalMinutes(interval) {
            return {
                minute: 1,
                '3minute': 3,
                '5minute': 5,
                '10minute': 10,
                '15minute': 15,
                '30minute': 30,
                '60minute': 60,
                day: 1440
            }[interval] || 1;
        }

        function getIstParts(dateValue = new Date()) {
            const date = dateValue instanceof Date ? dateValue : new Date(dateValue);
            const parts = new Intl.DateTimeFormat('en-CA', {
                timeZone: 'Asia/Kolkata',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            }).formatToParts(date);
            const getValue = (type) => Number(parts.find((part) => part.type === type)?.value || 0);
            return {
                year: getValue('year'),
                month: getValue('month'),
                day: getValue('day'),
                hour: getValue('hour'),
                minute: getValue('minute'),
                second: getValue('second')
            };
        }

        function buildIstIso(parts) {
            return `${parts.year}-${pad2(parts.month)}-${pad2(parts.day)}T${pad2(parts.hour)}:${pad2(parts.minute)}:${pad2(parts.second || 0)}+05:30`;
        }

        function getBucketStartIso(dateValue, interval) {
            const parts = getIstParts(dateValue);
            if (interval === 'day') {
                return `${parts.year}-${pad2(parts.month)}-${pad2(parts.day)}T00:00:00+05:30`;
            }

            const step = getIntervalMinutes(interval);
            const currentMinutes = (parts.hour * 60) + parts.minute;
            const marketOpenMinutes = 9 * 60 + 15;
            const bucketMinutes = currentMinutes >= marketOpenMinutes
                ? marketOpenMinutes + (Math.floor((currentMinutes - marketOpenMinutes) / step) * step)
                : currentMinutes - (currentMinutes % step);

            return buildIstIso({
                ...parts,
                hour: Math.floor(bucketMinutes / 60),
                minute: bucketMinutes % 60,
                second: 0
            });
        }

        function formatIstAxisLabel(timeValue, tickMarkType) {
            const date = new Date(Number(timeValue) * 1000);
            const parts = getIstParts(date);

            if (currentInterval === 'day') {
                return `${pad2(parts.day)}/${pad2(parts.month)}`;
            }

            if (tickMarkType === LightweightCharts.TickMarkType.DayOfMonth || tickMarkType === LightweightCharts.TickMarkType.Month) {
                return `${pad2(parts.day)}/${pad2(parts.month)}`;
            }

            return `${pad2(parts.hour)}:${pad2(parts.minute)}`;
        }

        function renderSuggestions() {
            const box = document.getElementById('suggestions');
            if (!suggestions.length) {
                box.style.display = 'none';
                box.innerHTML = '';
                return;
            }
            box.innerHTML = suggestions.map((s, i) => {
                const isNFO = s.exchange === 'NFO';
                const isOption = s.tradingsymbol.match(/[CP]E$/i);
                const isFuture = s.tradingsymbol.match(/FUT$/i);
                
                let typeLabel = '';
                if (isOption) {
                    typeLabel = s.tradingsymbol.endsWith('CE') ? 'CALL' : 'PUT';
                } else if (isFuture) {
                    typeLabel = 'FUTURE';
                }
                
                const displaySymbol = isNFO 
                    ? `<strong style="font-size:1.1em;color:#001f5c;">${s.tradingsymbol}</strong>${typeLabel ? ` <span style="font-size:0.8em;color:#0066cc;font-weight:bold;">[${typeLabel}]</span>` : ''}`
                    : `${s.tradingsymbol}${typeLabel ? ` <span style="font-size:0.8em;color:#666;">[${typeLabel}]</span>` : ''}`;
                
                const copyBtn = isNFO ? `<button class="copy-btn" onclick="event.stopPropagation(); navigator.clipboard.writeText('${s.tradingsymbol}'); alert('Copied: ${s.tradingsymbol}');" style="font-size:0.75em;padding:2px 8px;margin-left:8px;cursor:pointer;background:#e3f2fd;border:1px solid #0066cc;border-radius:4px;color:#0066cc;">Copy</button>` : '';
                
                return `
                <div class="item ${i === activeIndex ? 'active' : ''}" data-i="${i}" style="${isNFO ? 'background-color:#f9f9ff;' : ''}">
                    <div class="sym" style="display:flex;align-items:center;justify-content:space-between;">
                        <span>${displaySymbol} (${s.exchange})</span>
                        ${copyBtn}
                    </div>
                    <div class="meta" style="font-size:0.9em;color:#666;">${s.name || ''}</div>
                </div>
            `}).join('');
            box.style.display = 'block';
            box.querySelectorAll('.item').forEach((el) => {
                el.addEventListener('click', () => pickSuggestion(Number(el.getAttribute('data-i'))));
            });
        }

        async function fetchSuggestions(q) {
            if (!q) {
                suggestions = [];
                activeIndex = -1;
                renderSuggestions();
                return;
            }
            try {
                const r = await fetch(`${API_URL}/suggest/${encodeURIComponent(q)}`);
                const d = await r.json();
                suggestions = d.status === 'success' ? (d.results || []) : [];
                activeIndex = suggestions.length ? 0 : -1;
                renderSuggestions();
            } catch (_e) {
                suggestions = [];
                activeIndex = -1;
                renderSuggestions();
            }
        }

        function pickSuggestion(index) {
            const s = suggestions[index];
            if (!s) return;
            const key = `${s.exchange}:${s.tradingsymbol}`;
            const item = {
                key,
                tradingsymbol: s.tradingsymbol,
                exchange: s.exchange,
                name: s.name || '',
                instrument_token: s.instrument_token,
                lastPrice: null,
                change: null
            };

            document.getElementById('searchInput').value = s.tradingsymbol;
            suggestions = [];
            activeIndex = -1;
            renderSuggestions();

            const existing = watchlist.find((w) => w.key === key);
            if (!existing) {
                watchlist.unshift(item);
                if (watchlist.length > 30) watchlist = watchlist.slice(0, 30);
            }

            selectedItem = watchlist.find((w) => w.key === key) || item;
            renderWatchlist();
            saveState();
            connectLiveStream();
            loadSelectedInstrument({ preserveRange: true });
        }

        function renderWatchlist() {
            syncWatchlistLayout();
            const box = document.getElementById('watchlistBox');
            if (!watchlist.length) {
                box.innerHTML = '<div style="padding:10px;color:#64748b;">No symbols yet. Start typing above.</div>';
                return;
            }
            box.innerHTML = watchlist.map((w) => `
                <div class="witem ${selectedItem && w.key === selectedItem.key ? 'active' : ''}" data-key="${w.key}" style="display:flex;justify-content:space-between;align-items:center;">
                    <div style="flex:1;">
                        <div class="sym">${w.tradingsymbol}</div>
                        <div class="meta">${w.exchange}${w.name ? ` - ${w.name}` : ''}</div>
                    </div>
                    <div style="text-align:right;flex:1;">
                        <div class="sym">${w.lastPrice == null ? '--' : `Rs ${w.lastPrice.toFixed(2)}`}</div>
                        <div class="meta ${w.change == null ? '' : (w.change >= 0 ? 'positive' : 'negative')}">${w.change == null ? '--' : `${w.change.toFixed(2)}%`}</div>
                    </div>
                    <button class="witem-del" data-key="${w.key}" style="background:#dc2626;color:#fff;border:none;border-radius:4px;padding:4px 8px;font-size:0.75em;cursor:pointer;margin-left:8px;flex-shrink:0;" title="Delete">✕</button>
                </div>
            `).join('');
            box.querySelectorAll('.witem').forEach((el) => {
                el.addEventListener('click', (e) => {
                    if (e.target.closest('.witem-del')) return;
                    selectedItem = watchlist.find((w) => w.key === el.getAttribute('data-key')) || null;
                    renderWatchlist();
                    saveState();
                    loadSelectedInstrument({ preserveRange: true });
                });
            });
            box.querySelectorAll('.witem-del').forEach((el) => {
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const key = el.getAttribute('data-key');
                    watchlist = watchlist.filter((w) => w.key !== key);
                    if (selectedItem && selectedItem.key === key) selectedItem = null;
                    renderWatchlist();
                    saveState();
                    if (selectedItem) loadSelectedInstrument({ preserveRange: true });
                });
            });
        }

        function syncWatchlistLayout() {
            const layout = document.querySelector('.layout');
            const watchCard = document.querySelector('.watch-card');
            layout.classList.toggle('watch-collapsed', watchlistCollapsed);
            watchCard.classList.toggle('collapsed', watchlistCollapsed);
            document.getElementById('toggleWatchlistBtn').textContent = watchlistCollapsed ? '>' : '<';
        }

        async function getQuote(key) {
            const r = await fetch(`${API_URL}/quote/${encodeURIComponent(key)}`);
            const d = await r.json();
            if (d.status !== 'success') throw new Error(d.message || 'Quote failed');
            return d;
        }

        function toApiDateTime(value) {
            const parts = getIstParts(value);
            return `${parts.year}-${pad2(parts.month)}-${pad2(parts.day)} ${pad2(parts.hour)}:${pad2(parts.minute)}:${pad2(parts.second)}`;
        }

        function getInitialLookbackDays(interval) {
            if (interval === 'day') return 365 * 5;
            if (interval === '60minute') return 365;
            if (interval === '30minute') return 240;
            if (interval === '15minute' || interval === '10minute') return 180;
            return 90;
        }

        function getOlderChunkDays(interval) {
            if (interval === 'day') return 365 * 3;
            if (interval === '60minute') return 180;
            if (interval === '30minute') return 120;
            if (interval === '15minute' || interval === '10minute') return 90;
            if (interval === '5minute' || interval === '3minute') return 60;
            return 45;
        }

        function getRangeSteps(interval) {
            if (interval === 'day') return ['1M', '3M', '6M', '1Y', '3Y', '5Y', 'ALL'];
            if (interval === '60minute') return ['1M', '3M', '6M', '1Y', '3Y', '5Y', 'ALL'];
            return ['5D', '1M', '3M', '6M', '1Y', 'ALL'];
        }

        function mergeCandlesByTime(current, incoming) {
            const map = new Map(current.map((c) => [c.time, c]));
            incoming.forEach((c) => {
                if (!map.has(c.time)) map.set(c.time, c);
            });
            return Array.from(map.values()).sort((a, b) => new Date(a.time) - new Date(b.time));
        }

        async function expandHistoryRangeAndLoad(rangeBeforeLoad) {
            if (!selectedItem) return 0;
            if (historyRangeIndex >= historyRangeSteps.length - 1) return 0;

            historyRangeIndex += 1;
            const expanded = await getHistory(selectedItem.instrument_token, currentInterval, {
                range: historyRangeSteps[historyRangeIndex]
            });

            const oldLen = candleData.length;
            const merged = mergeCandlesByTime(candleData, expanded);
            const addedCount = merged.length - oldLen;
            if (addedCount <= 0) return 0;

            candleData = merged;
            renderChartFromData({ keepRange: true });
            if (rangeBeforeLoad) {
                applyLogicalRangeToAll({
                    from: rangeBeforeLoad.from + addedCount,
                    to: rangeBeforeLoad.to + addedCount
                });
            }
            return addedCount;
        }

        async function getHistory(token, interval, options = {}) {
            const params = new URLSearchParams();
            if (options.from && options.to) {
                params.set('from', options.from);
                params.set('to', options.to);
            } else {
                params.set('range', options.range || '3M');
            }
            const r = await fetch(`${API_URL}/history/${token}/${interval}?${params.toString()}`);
            const d = await r.json();
            if (d.status !== 'success') throw new Error(d.message || 'History failed');
            return d.candles || [];
        }

        async function loadOlderCandlesIfNeeded(range) {
            if (!selectedItem || !range || !Number.isFinite(range.from)) return;
            if (loadingOlderHistory || noMoreOlderHistory) return;

            // Logical indexes near 0 mean user is near the left edge of loaded history.
            if (range.from > 25) return;
            if (!candleData.length) return;

            loadingOlderHistory = true;
            updateMarketPill();

            try {
                const previousRange = mainChart.timeScale().getVisibleLogicalRange();
                const oldest = new Date(candleData[0].time);
                const toDate = new Date(oldest.getTime() - 1000);
                const fromDate = new Date(toDate.getTime() - (getOlderChunkDays(currentInterval) * 24 * 60 * 60 * 1000));

                const older = await getHistory(selectedItem.instrument_token, currentInterval, {
                    from: toApiDateTime(fromDate),
                    to: toApiDateTime(toDate)
                });

                const oldLen = candleData.length;
                const merged = mergeCandlesByTime(candleData, older);
                const addedCount = merged.length - oldLen;
                if (addedCount <= 0) {
                    // Fallback: expand hidden range if running backend ignores from/to.
                    const fallbackAdded = await expandHistoryRangeAndLoad(previousRange);
                    if (fallbackAdded <= 0) {
                        noMoreOlderHistory = true;
                    }
                    return;
                }

                candleData = merged;
                renderChartFromData({ keepRange: true });

                if (previousRange) {
                    applyLogicalRangeToAll({
                        from: previousRange.from + addedCount,
                        to: previousRange.to + addedCount
                    });
                }
            } catch (_err) {
            } finally {
                loadingOlderHistory = false;
                updateMarketPill();
            }
        }

        async function subscribeLiveTokens() {
            const tokens = [...new Set(watchlist.map((item) => Number(item.instrument_token)).filter(Boolean))];
            if (!tokens.length) return;

            const response = await fetch(`${API_URL}/stream/subscribe`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tokens })
            });
            const payload = await response.json();
            if (payload.status !== 'success') {
                throw new Error(payload.message || 'Live subscription failed');
            }
        }

        function disconnectLiveStream(resetState = true) {
            if (liveStream) {
                liveStream.close();
                liveStream = null;
            }
            if (resetState) {
                liveStreamState = 'disconnected';
                updateMarketPill();
            }
        }

        async function connectLiveStream() {
            const tokens = [...new Set(watchlist.map((item) => Number(item.instrument_token)).filter(Boolean))];
            if (!tokens.length) {
                disconnectLiveStream();
                return;
            }

            disconnectLiveStream(false);
            liveStreamState = 'connecting';
            updateMarketPill();

            try {
                await subscribeLiveTokens();
            } catch (err) {
                liveStreamState = 'disconnected';
                updateMarketPill();
                document.getElementById('selectedMeta').textContent = `Live stream error: ${err.message}`;
                return;
            }

            const url = `${API_URL}/stream/ticks?tokens=${encodeURIComponent(tokens.join(','))}`;
            liveStream = new EventSource(url);

            liveStream.onopen = () => {
                liveStreamState = 'connected';
                updateMarketPill();
            };

            liveStream.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data || '{}');
                    if (payload.connected === false) {
                        liveStreamState = 'connecting';
                    } else if (liveStreamState !== 'connected') {
                        liveStreamState = 'connected';
                    }
                    updateMarketPill();
                    (payload.ticks || []).forEach(applyLiveTick);
                } catch (_err) {
                }
            };

            liveStream.onerror = () => {
                liveStreamState = 'reconnecting';
                updateMarketPill();
            };
        }

        function initCharts() {
            const commonLayout = {
                background: { color: '#ffffff' },
                textColor: '#334155'
            };

            const commonTimeScale = {
                borderColor: '#e2e8f0',
                timeVisible: true,
                secondsVisible: false,
                tickMarkFormatter: formatIstAxisLabel
            };

            const commonLocalization = {
                locale: 'en-IN',
                timeFormatter: (timeValue) => {
                    const date = new Date(Number(timeValue) * 1000);
                    const parts = getIstParts(date);
                    return `${pad2(parts.day)}/${pad2(parts.month)} ${pad2(parts.hour)}:${pad2(parts.minute)} IST`;
                }

            mainChart = LightweightCharts.createChart(document.getElementById('candleChart'), {

                grid: { vertLines: { color: '#f1f5f9' }, horzLines: { color: '#f1f5f9' } },
                crosshair: { mode: LightweightCharts.CrosshairMode.Normal }

            candleSeries = mainChart.addCandlestickSeries({
                upColor: '#16a34a',
                downColor: '#dc2626',
                borderVisible: false,
                wickUpColor: '#16a34a',
                wickDownColor: '#dc2626'
            });

            rsiChart = LightweightCharts.createChart(document.getElementById('rsiChart'), {
                autoSize: true,
                layout: commonLayout,
                localization: commonLocalization,
                rightPriceScale: { borderColor: '#e2e8f0' },
                timeScale: commonTimeScale,
                grid: { vertLines: { color: '#f8fafc' }, horzLines: { color: '#f8fafc' } }
            });
            rsiSeries = rsiChart.addLineSeries({ color: '#8b5cf6', lineWidth: 2 });

            macdChart = LightweightCharts.createChart(document.getElementById('macdChart'), {
                autoSize: true,
                layout: commonLayout,
                localization: commonLocalization,
                rightPriceScale: { borderColor: '#e2e8f0' },
                timeScale: commonTimeScale,
                grid: { vertLines: { color: '#f8fafc' }, horzLines: { color: '#f8fafc' } }
            });
            macdSeries = macdChart.addLineSeries({ color: '#2563eb', lineWidth: 2 });
            macdSignalSeries = macdChart.addLineSeries({ color: '#f59e0b', lineWidth: 2 });
            macdHistogramSeries = macdChart.addHistogramSeries({ priceFormat: { type: 'price', precision: 2, minMove: 0.01 } });

            allSubCharts = [rsiChart, macdChart];

            // Bidirectional time-scale sync with re-entrant guard.
            function syncAllPanes(src, range) {
                if (syncingTimeScale || !range) return;
                syncingTimeScale = true;
                try {
                    if (src !== mainChart) mainChart.timeScale().setVisibleLogicalRange(range);
                    allSubCharts.forEach(c => { if (c !== src) try { c.timeScale().setVisibleLogicalRange(range); } catch (_) {} });
                    Object.values(dynamicPaneCharts).forEach(({ chart: c }) => {
                        if (c !== src) try { c.timeScale().setVisibleLogicalRange(range); } catch (_) {}
                    });
                } finally { syncingTimeScale = false; }
            }

            mainChart.timeScale().subscribeVisibleLogicalRangeChange((range) => {
                syncAllPanes(mainChart, range);
                if (lazyLoadDebounceTimer) clearTimeout(lazyLoadDebounceTimer);
                lazyLoadDebounceTimer = setTimeout(() => loadOlderCandlesIfNeeded(range), 120);
            });
            [rsiChart, macdChart].forEach(c => c.timeScale().subscribeVisibleLogicalRangeChange(r => syncAllPanes(c, r)));

            // OHLC crosshair tooltip
            mainChart.subscribeCrosshairMove((param) => {
                const tooltip = document.getElementById('ohlcTooltip');
                if (!ohlcEnabled || !param.point || !param.time || !candleData.length) {
                    tooltip.style.display = 'none'; return;
                }
                const candleEl = document.getElementById('candleChart');
                if (param.point.x < 0 || param.point.y < 0 ||
                    param.point.x > candleEl.clientWidth || param.point.y > candleEl.clientHeight) {
                    tooltip.style.display = 'none'; return;
                }
                const ht = param.time;
                const oc = candleData.find(c => toChartTime(c.time) === ht);
                if (!oc) { tooltip.style.display = 'none'; return; }
                const o = Number(oc.open).toFixed(2), h = Number(oc.high).toFixed(2);
                const l = Number(oc.low).toFixed(2), cl = Number(oc.close).toFixed(2);
                const rawVol = Number(oc.volume || 0);
                const volStr = rawVol > 0 ? rawVol.toLocaleString('en-IN') : '—';
                const chg = Number(oc.open) > 0 ? ((Number(oc.close) - Number(oc.open)) / Number(oc.open) * 100) : 0;
                const isUp = Number(oc.close) >= Number(oc.open);
                const clr = isUp ? '#4ade80' : '#f87171';

                // Trade signal section
                let signalHtml = '';
                const sig = tradeSignalMap.get(ht);
                if (sig) {
                    const dir = sig.side === 1 ? '▲ LONG' : '▼ SHORT';
                    const dirClr = sig.side === 1 ? '#4ade80' : '#f87171';
                    if (sig.kind === 'entry') {
                        signalHtml = `<div style="border-top:1px solid rgba(255,255,255,0.15);margin-top:4px;padding-top:4px;">` +
                            `<span style="color:${dirClr};font-weight:700">${dir} Entry</span><br>` +
                            `<span>Entry: <strong>${Number(sig.entry).toFixed(2)}</strong></span> ` +
                            `<span class="ohlc-l">SL: <strong>${Number(sig.stop).toFixed(2)}</strong></span> ` +
                            `<span class="ohlc-h">TP: <strong>${Number(sig.target).toFixed(2)}</strong></span>` +
                            `</div>`;
                    } else if (sig.kind === 'exit') {
                        const exitClr = sig.exitReason === 'SL' ? '#f87171' : sig.exitReason === 'TP' ? '#4ade80' : '#94a3b8';
                        const exitLabel = sig.exitReason === 'SL' ? '✕ Stop Loss Hit' : sig.exitReason === 'TP' ? '✔ Target Hit' : '⏱ Time Exit';
                        const pnl = sig.side === 1
                            ? ((sig.exitPrice - sig.entry) / sig.entry * 100).toFixed(2)
                            : ((sig.entry - sig.exitPrice) / sig.entry * 100).toFixed(2);
                        signalHtml = `<div style="border-top:1px solid rgba(255,255,255,0.15);margin-top:4px;padding-top:4px;">` +
                            `<span style="color:${exitClr};font-weight:700">${exitLabel}</span><br>` +
                            `<span>Exit: <strong>${Number(sig.exitPrice).toFixed(2)}</strong></span> ` +
                            `<span style="color:${Number(pnl) >= 0 ? '#4ade80' : '#f87171'}">P/L: ${Number(pnl) >= 0 ? '+' : ''}${pnl}%</span>` +
                            `</div>`;
                    }
                }

                tooltip.innerHTML = `<div class="ohlc-time">${formatCrosshairTime(ht)}</div>` +
                    `<div><span>O ${o}</span><span class="ohlc-h">H ${h}</span><span class="ohlc-l">L ${l}</span><span style="color:${clr}">C ${cl}</span></div>` +
                    `<div>Vol: <strong>${volStr}</strong>&nbsp;&nbsp;Chg: <span style="color:${clr}">${(chg >= 0 ? '+' : '') + chg.toFixed(2)}%</span></div>` +
                    signalHtml;
                tooltip.style.display = 'block';
                let lft = param.point.x + 16, top = param.point.y - 10;
                const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
                if (lft + tw > candleEl.clientWidth - 4) lft = param.point.x - tw - 10;
                if (top + th > candleEl.clientHeight - 4) top = param.point.y - th - 10;
                if (top < 4) top = 4; if (lft < 4) lft = 4;
                tooltip.style.left = lft + 'px'; tooltip.style.top = top + 'px';
            });
        }

        function applyLogicalRangeToAll(range) {
            if (!range) return;
            mainChart.timeScale().setVisibleLogicalRange(range);
            rsiChart.timeScale().setVisibleLogicalRange(range);
            macdChart.timeScale().setVisibleLogicalRange(range);

        function zoomChart(factor) {
            const range = mainChart.timeScale().getVisibleLogicalRange();
            if (!range) return;
            const center = (range.from + range.to) / 2;
            const span = Math.max(10, (range.to - range.from) * factor);
            applyLogicalRangeToAll({
                from: center - (span / 2),
                to: center + (span / 2)
            });
