                    ${ind.type === 'Keltner' ? `<label>ATR Pd <input class="tool-input atrperiod-input" type="number" min="2" value="${ind.atrPeriod || 10}" style="width:70px;" /></label>` : ''}
                    ${ind.type === 'Stochastic' ? `<label>%K <input class="tool-input kperiod-input" type="number" min="2" value="${ind.kPeriod || 14}" style="width:60px;" /></label><label>%D <input class="tool-input dperiod-input" type="number" min="1" value="${ind.dPeriod || 3}" style="width:60px;" /></label><label>Smooth <input class="tool-input smooth-input" type="number" min="1" value="${ind.smooth || 3}" style="width:60px;" /></label>` : ''}
                    ${ind.type === 'ParabolicSAR' ? `<label>Step <input class="tool-input step-input" type="number" min="0.001" step="0.001" value="${ind.step || 0.02}" style="width:70px;" /></label><label>Max <input class="tool-input max-input" type="number" min="0.01" step="0.01" value="${ind.max || 0.2}" style="width:70px;" /></label>` : ''}
                    ${ind.type === 'Trade' ? `<label>Strategy <select class="tool-select strategy-input"><option value="BB_EMA_MOM" ${(ind.strategy||'')==='BB_EMA_MOM'?'selected':''}>★ BB+EMA+MOM (83%)</option><option value="EMA_DON_AND2" ${(ind.strategy||'EMA_DON_AND2')==='EMA_DON_AND2'?'selected':''}>EMA+DON</option><option value="RSI_BOLL_AND2" ${(ind.strategy||'')==='RSI_BOLL_AND2'?'selected':''}>RSI+BOLL</option><option value="ADX_EMA_RSI" ${(ind.strategy||'')==='ADX_EMA_RSI'?'selected':''}>ADX+EMA+RSI</option><option value="STOCH_BB_EMA" ${(ind.strategy||'')==='STOCH_BB_EMA'?'selected':''}>Stoch+BB+EMA</option><option value="MULTI_VOTE4" ${(ind.strategy||'')==='MULTI_VOTE4'?'selected':''}>Multi Vote 4</option><option value="STRONG_TREND" ${(ind.strategy||'')==='STRONG_TREND'?'selected':''}>Strong Trend</option></select></label><label>SL% <input class="tool-input sl-input" type="number" min="0.1" step="0.1" value="${ind.slPercent || 0.4}" style="width:70px;" /></label><label>RR <input class="tool-input rr-input" type="number" min="0.1" step="0.1" value="${ind.rr || 0.8}" style="width:70px;" /></label><label>Hold <input class="tool-input hold-input" type="number" min="1" step="1" value="${ind.holdBars || 12}" style="width:70px;" /></label>` : ''}
                    ${ind.type === 'VWAP_AI' ? `<label>Index<select class="tool-select vwap-index-input"><option value="50" ${+(ind.roundInterval||50)===50?'selected':''}>Nifty/FinNifty (50pt)</option><option value="100" ${+(ind.roundInterval||50)===100?'selected':''}>BankNifty (100pt)</option><option value="25" ${+(ind.roundInterval||50)===25?'selected':''}>25pt</option></select></label><label>SL pts<input class="tool-input vwap-sl-input" type="number" min="1" step="1" value="${ind.slPoints||10}" style="width:60px;"/></label><label>Vol×<input class="tool-input vwap-vol-input" type="number" min="0.1" step="0.1" value="${ind.volMultiplier||1.0}" style="width:60px;"/></label>` : ''}
                    <label>Color <input class="tool-input color-input" type="color" value="${ind.color || '#2563eb'}" style="width:54px;padding:2px;" /></label>
                    ${ind.type === 'Supertrend' ? `<button class="toggle-signals-btn">${ind.showSignals === false ? 'Show Arrows' : 'Hide Arrows'}</button>` : ''}
                    <button class="toggle-btn">${ind.visible === false ? 'Show' : 'Hide'}</button>
                    <button class="remove-btn">Remove</button>
                </div>
            `).join('');

            host.querySelectorAll('.indicator-row').forEach((row) => {
                const id = row.getAttribute('data-id');
                const byId = () => indicators.find((x) => x.id === id);

                row.querySelector('.period-input').addEventListener('change', (e) => {
                    const item = byId(); if (!item) return;
                    item.period = Math.max(2, Number(e.target.value) || item.period);
                    saveState(); renderChartFromData({ keepRange: true });
                });
                const factorInput = row.querySelector('.factor-input');
                if (factorInput) factorInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.factor = Math.max(0.1, Number(e.target.value) || item.factor || 2); saveState(); renderChartFromData({ keepRange: true }); });
                const atrPdInput = row.querySelector('.atrperiod-input');
                if (atrPdInput) atrPdInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.atrPeriod = Math.max(2, Number(e.target.value) || 10); saveState(); renderChartFromData({ keepRange: true }); });
                const kPdInput = row.querySelector('.kperiod-input');
                if (kPdInput) kPdInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.kPeriod = Math.max(2, Number(e.target.value) || 14); saveState(); renderChartFromData({ keepRange: true }); });
                const dPdInput = row.querySelector('.dperiod-input');
                if (dPdInput) dPdInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.dPeriod = Math.max(1, Number(e.target.value) || 3); saveState(); renderChartFromData({ keepRange: true }); });
                const smoothInput = row.querySelector('.smooth-input');
                if (smoothInput) smoothInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.smooth = Math.max(1, Number(e.target.value) || 3); saveState(); renderChartFromData({ keepRange: true }); });
                const stepInput = row.querySelector('.step-input');
                if (stepInput) stepInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.step = Math.max(0.001, Number(e.target.value) || 0.02); saveState(); renderChartFromData({ keepRange: true }); });
                const maxInput = row.querySelector('.max-input');
                if (maxInput) maxInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.max = Math.max(0.01, Number(e.target.value) || 0.2); saveState(); renderChartFromData({ keepRange: true }); });
                const signalsButton = row.querySelector('.toggle-signals-btn');
                if (signalsButton) signalsButton.addEventListener('click', () => { const item = byId(); if (!item) return; item.showSignals = item.showSignals === false; saveState(); renderIndicators(); renderChartFromData({ keepRange: true }); });
                const strategyInput = row.querySelector('.strategy-input');
                if (strategyInput) strategyInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.strategy = e.target.value; saveState(); renderChartFromData({ keepRange: true }); });
                const slInput = row.querySelector('.sl-input');
                if (slInput) slInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.slPercent = Math.max(0.1, Number(e.target.value) || 0.4); saveState(); renderChartFromData({ keepRange: true }); });
                const rrInput = row.querySelector('.rr-input');
                if (rrInput) rrInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.rr = Math.max(0.1, Number(e.target.value) || 0.8); saveState(); renderChartFromData({ keepRange: true }); });
                const holdInput = row.querySelector('.hold-input');
                if (holdInput) holdInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.holdBars = Math.max(1, Number(e.target.value) || 12); saveState(); renderChartFromData({ keepRange: true }); });
                const vwapIdxInput = row.querySelector('.vwap-index-input');
                if (vwapIdxInput) vwapIdxInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.roundInterval = Number(e.target.value); saveState(); renderChartFromData({ keepRange: true }); });
                const vwapSlInput = row.querySelector('.vwap-sl-input');
                if (vwapSlInput) vwapSlInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.slPoints = Math.max(1, Number(e.target.value)||10); saveState(); renderChartFromData({ keepRange: true }); });
                const vwapVolInput = row.querySelector('.vwap-vol-input');
                if (vwapVolInput) vwapVolInput.addEventListener('change', (e) => { const item = byId(); if (!item) return; item.volMultiplier = Math.max(0.1, Number(e.target.value)||1.0); saveState(); renderChartFromData({ keepRange: true }); });
                row.querySelector('.color-input').addEventListener('change', (e) => { const item = byId(); if (!item) return; item.color = e.target.value; saveState(); renderChartFromData({ keepRange: true }); });
                row.querySelector('.toggle-btn').addEventListener('click', () => { const item = byId(); if (!item) return; item.visible = item.visible === false; saveState(); renderIndicators(); renderChartFromData({ keepRange: true }); });
                row.querySelector('.remove-btn').addEventListener('click', () => { indicators = indicators.filter((x) => x.id !== id); saveState(); renderIndicators(); renderChartFromData({ keepRange: true }); });
            });
        }

        function clearDynamicPanes() {
            const container = document.getElementById('dynamicPanesContainer');
            Object.values(dynamicPaneCharts).forEach(({ chart, div }) => {
                try { chart.remove(); } catch (_) {}
                if (div && div.parentNode) div.parentNode.removeChild(div);
            });
            dynamicPaneCharts = {};
        }

        function createDynamicSubPane(indId) {
            const container = document.getElementById('dynamicPanesContainer');
            const div = document.createElement('div');
            div.className = 'dyn-pane';
            container.appendChild(div);
            const chart = LightweightCharts.createChart(div, {
                autoSize: true,
                layout: { background: { color: '#ffffff' }, textColor: '#334155' },
                localization: {
                    locale: 'en-IN',
                    timeFormatter: (tv) => {
                        const d = new Date(Number(tv) * 1000), p = getIstParts(d);
                        return `${pad2(p.day)}/${pad2(p.month)} ${pad2(p.hour)}:${pad2(p.minute)} IST`;
                    }
                },
                rightPriceScale: { borderColor: '#e2e8f0' },
                timeScale: { borderColor: '#e2e8f0', timeVisible: true, secondsVisible: false, tickMarkFormatter: formatIstAxisLabel },
                grid: { vertLines: { color: '#f8fafc' }, horzLines: { color: '#f8fafc' } }
            });
            const curRange = mainChart.timeScale().getVisibleLogicalRange();
            if (curRange) { try { chart.timeScale().setVisibleLogicalRange(curRange); } catch (_) {} }
            chart.timeScale().subscribeVisibleLogicalRangeChange(r => {
                if (syncingTimeScale || !r) return;
                syncingTimeScale = true;
                try {
                    mainChart.timeScale().setVisibleLogicalRange(r);
                    allSubCharts.forEach(c => { try { c.timeScale().setVisibleLogicalRange(r); } catch (_) {} });
                    Object.values(dynamicPaneCharts).forEach(({ chart: c }) => {
                        if (c !== chart) try { c.timeScale().setVisibleLogicalRange(r); } catch (_) {}
                    });
                } finally { syncingTimeScale = false; }
            });
            dynamicPaneCharts[indId] = { chart, div };
            return chart;
        }

        function addZeroLine(chart, data, color = '#94a3b8') {
            if (!data.length) return;
            const z = chart.addLineSeries({ color, lineWidth: 1, lineStyle: 2, priceLineVisible: false, lastValueVisible: false });
            z.setData([{ time: data[0].time, value: 0 }, { time: data[data.length - 1].time, value: 0 }]);
        }

        function clearOverlaySeries() {
            overlaySeries.forEach((series) => mainChart.removeSeries(series));
            overlaySeries = [];
        }

        function renderChartFromData(options = {}) {
            clearDynamicPanes();
            clearOverlaySeries();
            const candlePoints = candleData.map((c) => ({
                time: toChartTime(c.time),
                open: c.open,
                high: c.high,
                low: c.low,
                close: c.close
            }));
            candleSeries.setData(candlePoints);
            candleSeries.setMarkers([]);

            const latest = candleData[candleData.length - 1];
            if (latest) {
                document.getElementById('selectedMeta').textContent = `O ${latest.open} | H ${latest.high} | L ${latest.low} | C ${latest.close} | V ${latest.volume}`;
            }

            const visibleIndicators = indicators.filter((x) => x.visible !== false);
            const emaIndicators = visibleIndicators.filter((x) => x.type === 'EMA');
            emaIndicators.forEach((ind) => {
                const series = mainChart.addLineSeries({ color: ind.color, lineWidth: 2, priceLineVisible: false });
                series.setData(computeEMA(candleData, ind.period));
                overlaySeries.push(series);
            });

            const smaIndicators = visibleIndicators.filter((x) => x.type === 'SMA');
            smaIndicators.forEach((ind) => {
                const series = mainChart.addLineSeries({ color: ind.color, lineWidth: 2, priceLineVisible: false, lineStyle: 1 });
                series.setData(computeSMA(candleData, ind.period));
                overlaySeries.push(series);
            });

            const vwapIndicators = visibleIndicators.filter((x) => x.type === 'VWAP');
            vwapIndicators.forEach((ind) => {
                const series = mainChart.addLineSeries({ color: ind.color, lineWidth: 2, priceLineVisible: false, lineStyle: 2 });
                series.setData(computeVWAP(candleData));
                overlaySeries.push(series);
            });

            // ── VWAP AI Indicator ────────────────────────────────────────────────
            const vwapAIMarkers = [];
            lastVWAPAISignals = [];
            const vwapAIIndicators = visibleIndicators.filter(x => x.type === 'VWAP_AI');
            vwapAIIndicators.forEach(ind => {
                const roundInterval = Number(ind.roundInterval || 50);
                const slPoints    = Number(ind.slPoints    || 10);
                const volMult     = Number(ind.volMultiplier || 1.0);

                // 1. Daily-reset VWAP line
                const vwapDR = computeVWAP_DailyReset(candleData);
                const vwapAISeries = mainChart.addLineSeries({
                    color: ind.color || '#f97316', lineWidth: 2, lineStyle: 0,
                    priceLineVisible: false, lastValueVisible: true, title: 'VWAP'
                });
                vwapAISeries.setData(vwapDR);
                overlaySeries.push(vwapAISeries);

                // 2. PDH / PDL horizontal lines
                const { pdhMap, pdlMap, pdLines } = computePDHL(candleData);
                if (ind.showPDHL !== false) {
                    pdLines.forEach(line => {
                        const s = mainChart.addLineSeries({
                            color: line.type === 'PDH' ? '#16a34a' : '#dc2626',
                            lineWidth: 1, lineStyle: 2,
                            priceLineVisible: false, lastValueVisible: true, title: line.type
                        });
                        s.setData(line.data);
                        overlaySeries.push(s);
                    });
                }

                // 3. Psychological round number levels
                const roundLevels = computeRoundLevels(candleData, roundInterval);
                if (ind.showRounds !== false && roundLevels.length) {
                    const t0 = toChartTime(candleData[0].time);
                    const t1 = toChartTime(candleData[candleData.length - 1].time);
                    roundLevels.forEach(lvl => {
                        const s = mainChart.addLineSeries({
                            color: 'rgba(148,163,184,0.35)', lineWidth: 1, lineStyle: 3,
                            priceLineVisible: false, lastValueVisible: false
                        });
                        s.setData([{ time: t0, value: lvl }, { time: t1, value: lvl }]);
                        overlaySeries.push(s);
                    });
                }

                // 4. Signal detection
                const volAvg = computeVolAvg10(candleData, 10);
                const aiSignals = detectVWAPAISignals(candleData, vwapDR, pdhMap, pdlMap, roundLevels, volAvg, slPoints, volMult);
                lastVWAPAISignals = aiSignals;

                // 5. Markers + crosshair map
                aiSignals.forEach(sig => {
                    vwapAIMarkers.push({
                        time: sig.time,
                        position: sig.side === 1 ? 'belowBar' : 'aboveBar',
                        color:    sig.side === 1 ? '#16a34a' : '#dc2626',
                        shape:    sig.side === 1 ? 'arrowUp' : 'arrowDown',
                        text:     sig.side === 1 ? `CE▲ ${sig.setup}` : `PE▼ ${sig.setup}`,
                        size: 2
                    });
                    tradeSignalMap.set(sig.time, {
                        kind: 'entry', side: sig.side,
                        entry: sig.entry, stop: sig.stop, target: sig.target
                    });
                });
            });

            const bbIndicators = visibleIndicators.filter((x) => x.type === 'Bollinger');
            bbIndicators.forEach((ind) => {
                const bands = computeBollinger(candleData, ind.period, ind.factor || 2);
                const basisSeries = mainChart.addLineSeries({ color: ind.color, lineWidth: 2, priceLineVisible: false });
                const upperSeries = mainChart.addLineSeries({ color: '#94a3b8', lineWidth: 1, priceLineVisible: false });
                const lowerSeries = mainChart.addLineSeries({ color: '#94a3b8', lineWidth: 1, priceLineVisible: false });
                basisSeries.setData(bands.basis);
                upperSeries.setData(bands.upper);
                lowerSeries.setData(bands.lower);
                overlaySeries.push(basisSeries, upperSeries, lowerSeries);
            });

            const stIndicators = visibleIndicators.filter((x) => x.type === 'Supertrend');
            const tradeIndicators = visibleIndicators.filter((x) => x.type === 'Trade');
            const stMarkers = [];
            stIndicators.forEach((ind) => {
                const { up, down, markers } = computeSupertrend(candleData, ind.period, ind.factor || 3);
                const upSeries = mainChart.addLineSeries({ color: '#16a34a', lineWidth: 2, priceLineVisible: false });
                const downSeries = mainChart.addLineSeries({ color: ind.color, lineWidth: 2, priceLineVisible: false });
                upSeries.setData(up);
                downSeries.setData(down);
                overlaySeries.push(upSeries, downSeries);
                if (ind.showSignals !== false) {
                    stMarkers.push(...markers.map((marker) => ({
                        ...marker,
                        color: marker.shape === 'arrowUp' ? '#16a34a' : ind.color,
                        size: 1
                    })));
                }
            });
            tradeSignalMap = new Map();
            const tradeMarkers = [];
            tradeIndicators.forEach((ind) => {
                const signal = computeTradeComboSignal(candleData, ind.strategy || 'EMA_DON_AND2');
                const trade = simulateTradeMarkers(
                    candleData,
                    signal,
                    ind.slPercent || 0.4,
                    ind.rr || 0.8,
                    ind.holdBars || 12,
                    ind.color || '#2563eb'
                );
                
                // Debug: log if markers were created
                if (trade.markers.length > 0) {
                    console.log(`Trade strategy ${ind.strategy}: ${trade.markers.length} markers created`);
                }
                
                trade.signalsByTime.forEach((v, k) => tradeSignalMap.set(k, v));
                tradeMarkers.push(...trade.markers);

                trade.stopLines.forEach((line) => {
                    const stopSeries = mainChart.addLineSeries({
                        color: ind.color || '#2563eb',
                        lineWidth: 1,
                        lineStyle: 2,
                        priceLineVisible: false,
                        lastValueVisible: false
                    });
                    stopSeries.setData(line);
                    overlaySeries.push(stopSeries);
                });

                trade.targetLines.forEach((line) => {
                    const targetSeries = mainChart.addLineSeries({
                        color: '#16a34a',
                        lineWidth: 1,
                        lineStyle: 2,
                        priceLineVisible: false,
                        lastValueVisible: false
                    });
                    targetSeries.setData(line);
                    overlaySeries.push(targetSeries);
                });
            });

            // Debug: log total markers before setting
            console.log(`Setting ${tradeMarkers.length} trade + ${stMarkers.length} supertrend + ${vwapAIMarkers.length} VWAP AI markers`);
            
            // Ensure markers are set only if they exist
            const allMarkers = [...stMarkers, ...tradeMarkers, ...vwapAIMarkers];
            if (allMarkers.length > 0) {
                candleSeries.setMarkers(allMarkers);
                console.log('Markers successfully set on chart');
            } else {
                candleSeries.setMarkers([]);
            }

            const rsiIndicator = visibleIndicators.find((x) => x.type === 'RSI');
            const rsiHost = document.getElementById('rsiChart');
            if (rsiIndicator) {
                rsiHost.style.display = 'block';
                rsiSeries.applyOptions({ color: rsiIndicator.color });
                rsiSeries.setData(computeRSI(candleData, rsiIndicator.period));
            } else {
                rsiHost.style.display = 'none';
                rsiSeries.setData([]);
            }

            const macdIndicator = visibleIndicators.find((x) => x.type === 'MACD');
            const macdHost = document.getElementById('macdChart');
            if (macdIndicator) {
                macdHost.style.display = 'block';
                const macd = computeMACD(candleData);
                macdSeries.applyOptions({ color: macdIndicator.color });
                macdSeries.setData(macd.macd);
                macdSignalSeries.setData(macd.signal);
                macdHistogramSeries.setData(macd.histogram);
            } else {
                macdHost.style.display = 'none';
                macdSeries.setData([]);
                macdSignalSeries.setData([]);
                macdHistogramSeries.setData([]);
            }

            // ── Dynamic sub-pane oscillators ──────────────────────────────────
            const oscTypes = ['ADX','ROC','Stochastic','OBV','VPT','MFI','CMF','ADLine','EOM','ATR'];
            visibleIndicators.filter(x => oscTypes.includes(x.type)).forEach(ind => {
                const chart = createDynamicSubPane(ind.id);
                const c = ind.color || '#2563eb';
                switch (ind.type) {
                    case 'ADX': {
                        const { adx, plusDI, minusDI } = computeADX(candleData, ind.period || 14);
                        chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'ADX' }).setData(adx);
                        chart.addLineSeries({ color: '#16a34a', lineWidth: 1, priceLineVisible: false, title: '+DI' }).setData(plusDI);
                        chart.addLineSeries({ color: '#dc2626', lineWidth: 1, priceLineVisible: false, title: '-DI' }).setData(minusDI);
                        break;
                    }
                    case 'ROC': {
                        const d = computeROC(candleData, ind.period || 12);
                        chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'ROC' }).setData(d);
                        addZeroLine(chart, d);
                        break;
                    }
                    case 'Stochastic': {
                        const { k, d } = computeStochastic(candleData, ind.kPeriod || 14, ind.dPeriod || 3, ind.smooth || 3);
                        chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: '%K' }).setData(k);
                        chart.addLineSeries({ color: '#f97316', lineWidth: 1, lineStyle: 2, priceLineVisible: false, title: '%D' }).setData(d);
                        break;
                    }
                    case 'OBV': chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'OBV' }).setData(computeOBV(candleData)); break;
                    case 'VPT': chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'VPT' }).setData(computeVPT(candleData)); break;
                    case 'MFI': chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'MFI' }).setData(computeMFI(candleData, ind.period || 14)); break;
                    case 'CMF': { const d = computeCMF(candleData, ind.period || 20); chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'CMF' }).setData(d); addZeroLine(chart, d); break; }
                    case 'ADLine': chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'A/D' }).setData(computeADLine(candleData)); break;
                    case 'EOM': { const d = computeEOM(candleData, ind.period || 14); chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'EOM' }).setData(d); addZeroLine(chart, d); break; }
                    case 'ATR': chart.addLineSeries({ color: c, lineWidth: 2, priceLineVisible: false, title: 'ATR' }).setData(computeATR(candleData, ind.period || 14)); break;
                }
            });

            // ── Overlay: Parabolic SAR ────────────────────────────────────────
            visibleIndicators.filter(x => x.type === 'ParabolicSAR').forEach(ind => {
                const sarData = computeParabolicSAR(candleData, ind.step || 0.02, ind.max || 0.2);
                const sarS = mainChart.addLineSeries({ color: ind.color || '#f43f5e', lineWidth: 0, pointMarkersVisible: true, pointMarkersRadius: 2, priceLineVisible: false, lastValueVisible: false });
                sarS.setData(sarData); overlaySeries.push(sarS);
            });

            // ── Overlay: Keltner Channel ──────────────────────────────────────
            visibleIndicators.filter(x => x.type === 'Keltner').forEach(ind => {
                const kc = computeKeltner(candleData, ind.period || 20, ind.atrPeriod || 10, ind.factor || 2);
                const mS = mainChart.addLineSeries({ color: ind.color || '#14b8a6', lineWidth: 2, priceLineVisible: false });
                const uS = mainChart.addLineSeries({ color: '#94a3b8', lineWidth: 1, lineStyle: 1, priceLineVisible: false });
                const lS = mainChart.addLineSeries({ color: '#94a3b8', lineWidth: 1, lineStyle: 1, priceLineVisible: false });
                mS.setData(kc.middle); uS.setData(kc.upper); lS.setData(kc.lower);
                overlaySeries.push(mS, uS, lS);
            });

            // ── Overlay: Donchian Channel ─────────────────────────────────────
            visibleIndicators.filter(x => x.type === 'Donchian').forEach(ind => {
                const dc = computeDonchian(candleData, ind.period || 20);
                const c = ind.color || '#fb923c';
                const mS = mainChart.addLineSeries({ color: c, lineWidth: 1, lineStyle: 2, priceLineVisible: false });
                const uS = mainChart.addLineSeries({ color: c, lineWidth: 1, priceLineVisible: false });
                const lS = mainChart.addLineSeries({ color: c, lineWidth: 1, priceLineVisible: false });
                mS.setData(dc.middle); uS.setData(dc.upper); lS.setData(dc.lower);
                overlaySeries.push(mS, uS, lS);
            });

            if (candlePoints.length && !options.keepRange) {
                const visibleRange = { from: candlePoints[0].time, to: candlePoints[candlePoints.length - 1].time };
                mainChart.timeScale().setVisibleRange(visibleRange);
                allSubCharts.forEach(c => { try { c.timeScale().setVisibleRange(visibleRange); } catch (_) {} });
                Object.values(dynamicPaneCharts).forEach(({ chart }) => { try { chart.timeScale().setVisibleRange(visibleRange); } catch (_) {} });
            } else if (!options.keepRange) {
                mainChart.timeScale().fitContent();
                allSubCharts.forEach(c => { try { c.timeScale().fitContent(); } catch (_) {} });
                Object.values(dynamicPaneCharts).forEach(({ chart }) => { try { chart.timeScale().fitContent(); } catch (_) {} });
            }
        }

        function updateSelectedPriceDisplay(lastPrice, netChange, percentChange) {
            const priceEl = document.getElementById('selectedPrice');
            priceEl.textContent = `Rs ${lastPrice.toFixed(2)} (${netChange >= 0 ? '+' : ''}${netChange.toFixed(2)}, ${percentChange.toFixed(2)}%)`;
            priceEl.className = `price ${netChange >= 0 ? 'positive' : 'negative'}`;
        }

        function applyTickToCurrentCandle(tick) {
            if (!selectedItem || Number(selectedItem.instrument_token) !== Number(tick.instrument_token)) return;
            const livePrice = Number(tick.last_price || 0);
            if (!livePrice) return;

            const tickTime = tick.exchange_timestamp || tick.last_traded_timestamp || tick.timestamp || new Date().toISOString();
            const bucketTime = getBucketStartIso(tickTime, currentInterval);
            const tickEpoch = toChartTime(bucketTime);

            if (!candleData.length) {
                candleData = [{
                    time: bucketTime,
                    open: livePrice,
                    high: livePrice,
                    low: livePrice,
                    close: livePrice,
                    volume: Number(tick.volume_traded || 0)
                }];
                renderChartFromData({ keepRange: true });
                return;
            }

            const lastCandle = candleData[candleData.length - 1];
            const lastEpoch = toChartTime(lastCandle.time);

            if (tickEpoch > lastEpoch) {
                candleData.push({
                    time: bucketTime,
                    open: Number(lastCandle.close || livePrice),
                    high: livePrice,
                    low: livePrice,
                    close: livePrice,
                    volume: Number(tick.volume_traded || lastCandle.volume || 0)
                });
            } else if (tickEpoch === lastEpoch) {
                lastCandle.high = Math.max(Number(lastCandle.high), livePrice);
                lastCandle.low = Math.min(Number(lastCandle.low), livePrice);
                lastCandle.close = livePrice;
                if (tick.volume_traded != null) {
                    lastCandle.volume = Math.max(Number(lastCandle.volume || 0), Number(tick.volume_traded || 0));
                }
            } else {
                return;
            }

            renderChartFromData({ keepRange: true });
        }

        function applyLiveTick(tick) {
            const token = Number(tick.instrument_token);
            if (!token) return;

            const item = watchlist.find((entry) => Number(entry.instrument_token) === token);
            if (!item) return;

            const lastPrice = Number(tick.last_price || 0);
            const previousClose = Number(tick.ohlc?.close || 0);
            const netChange = previousClose ? lastPrice - previousClose : Number(tick.net_change || 0);
            const percentChange = previousClose ? (netChange / previousClose) * 100 : Number(tick.change || 0);

            item.lastPrice = lastPrice;
            item.change = percentChange;
            renderWatchlist();

            if (selectedItem && selectedItem.key === item.key) {
                updateSelectedPriceDisplay(lastPrice, netChange, percentChange);
                applyTickToCurrentCandle(tick);
            }
        }

        async function refreshQuote() {
            if (!selectedItem) return;
            try {
                const quoteResp = await getQuote(selectedItem.key);
                const q = quoteResp.data || {};
                const lp = Number(q.last_price || 0);
                const ch = Number(q.net_change || 0);
                const pct = Number(q.net_change_percent || 0);
                selectedItem.lastPrice = lp;
                selectedItem.change = pct;
                renderWatchlist();
                updateSelectedPriceDisplay(lp, ch, pct);
            } catch (err) {
                document.getElementById('selectedPrice').textContent = err.message;
            }
        }

        async function loadSelectedInstrument(options = {}) {
            if (!selectedItem) return;
            const preserveRange = options.preserveRange === true;
            document.getElementById('selectedSymbol').textContent = `${selectedItem.tradingsymbol} (${selectedItem.exchange})`;
            try {
                noMoreOlderHistory = false;
                historyRangeSteps = getRangeSteps(currentInterval);
                historyRangeIndex = 0;

                // Start smaller for faster load; older data auto-loads while panning left.
                candleData = await getHistory(selectedItem.instrument_token, currentInterval, {
                    range: historyRangeSteps[historyRangeIndex]
                });
                renderChartFromData({ keepRange: preserveRange });
                await refreshQuote();
                
                // Fetch strategy signal
                await fetchStrategySignal();
                
                saveState();
            } catch (err) {
                document.getElementById('selectedMeta').textContent = `Chart error: ${err.message}`;
            }
        }
        
        async function fetchStrategySignal() {
            if (!selectedItem) return;
            try {
                if (!candleData || candleData.length < 25) {
                    document.getElementById('strategyPanel').style.display = 'none';
                    return;
                }

                const panel      = document.getElementById('strategyPanel');
                const titleEl    = document.getElementById('strategyPanelTitle');
                const signalEl   = document.getElementById('strategySignal');
                const strengthEl = document.getElementById('signalStrength');
                const reasonEl   = document.getElementById('signalReason');
                const detailsEl  = document.getElementById('signalDetails');

                // ── VWAP AI mode ────────────────────────────────────────────────
                const hasVWAPAI = indicators.some(x => x.type === 'VWAP_AI' && x.visible !== false);
                if (hasVWAPAI) {
                    if (titleEl) titleEl.textContent = 'VWAP AI Options Strategy (5-min)';

                    if (lastVWAPAISignals.length > 0) {
                        const sig = lastVWAPAISignals[lastVWAPAISignals.length - 1];
                        const isCE = sig.side === 1;

                        signalEl.textContent  = isCE ? '🟢 CE BUY — Call Option' : '🔴 PE SELL — Put Option';
                        signalEl.style.color  = isCE ? '#16a34a' : '#dc2626';
                        signalEl.style.fontSize = '1.1em';

                        const risk   = Math.abs(sig.entry - sig.stop);
                        const reward = Math.abs(sig.target - sig.entry);
                        const rr     = risk > 0 ? (reward / risk).toFixed(1) : '--';
                        strengthEl.textContent = `Entry: ${sig.entry.toFixed(2)}  |  SL: ${sig.stop.toFixed(2)}  |  Target: ${sig.target.toFixed(2)}  |  R:R = 1:${rr}`;

                        const volRatio   = sig.avgVol > 0 ? (sig.vol / sig.avgVol).toFixed(1) : '--';
                        const timDecay   = checkTimeDecayRisk(candleData);
                        reasonEl.textContent   = `Setup: ${sig.setup}  |  Vol: ${volRatio}× avg  |  VWAP: ${sig.vwap.toFixed(2)}`;

                        if (detailsEl) {
                            const contract   = `ATM ${isCE ? 'CE' : 'PE'} — verify bid-ask spread < ₹0.50`;
                            const slRule     = `Hard SL: 15–20% of premium  |  Trail SL to cost at 1:1`;
                            const timeWarn   = timDecay
                                ? '⚠️ TIME DECAY ALERT — 3 sideways candles. Exit immediately!'
                                : '✓ No time-decay risk detected';
                            const cooldown   = `2% account risk rule  |  Max 2 consecutive losses before pause`;
                            detailsEl.innerHTML =
                                `<div style="color:#cbd5e1">${contract}</div>` +
                                `<div style="color:#94a3b8">${slRule}</div>` +
                                `<div style="color:${timDecay?'#ef4444':'#4ade80'};font-weight:600">${timeWarn}</div>` +
                                `<div style="color:#64748b">${cooldown}</div>`;
                            detailsEl.style.display = 'block';
                        }
                    } else {
                        signalEl.textContent  = '⏳ Scanning for setup...';
                        signalEl.style.color  = '#94a3b8';
                        signalEl.style.fontSize = '1em';
                        strengthEl.textContent = 'Waiting: price must be above/below VWAP with strong volume';
                        reasonEl.textContent   = 'No CE/PE signal on current chart — try 5-min interval on index';
                        if (detailsEl) detailsEl.style.display = 'none';
                    }
                    panel.style.display = 'block';
                    return;
                }

                // ── Fallback: simple price-action signal ────────────────────────
                if (titleEl) titleEl.textContent = '83% Win Rate Strategy';
                if (detailsEl) detailsEl.style.display = 'none';

                const latest    = candleData[candleData.length - 1];
                const prevCandle = candleData[candleData.length - 2];
                let signalValue = 'NO_SIGNAL', strength = 1, reasoning = [];

                if (candleData.length >= 3) {
                    const prev2 = candleData[candleData.length - 3];
                    if (latest.close > latest.open && latest.high > prevCandle.high && prevCandle.high > prev2.high) {
                        signalValue = 'BUY'; strength = 3;
                        reasoning = ['Price making higher highs', 'Bullish candle', '83% strategy active'];
                    } else if (latest.close < latest.open && latest.low < prevCandle.low && prevCandle.low < prev2.low) {
                        signalValue = 'SELL'; strength = 3;
                        reasoning = ['Price making lower lows', 'Bearish candle', '83% strategy active'];
                    } else if (latest.close > latest.open) {
                        signalValue = 'BUY'; strength = 2; reasoning = ['Bullish candle', 'Close above open'];
                    } else if (latest.close < latest.open) {
                        signalValue = 'SELL'; strength = 2; reasoning = ['Bearish candle', 'Close below open'];
                    }
                }

                signalEl.textContent  = signalValue === 'BUY' ? '🟢 BUY' : signalValue === 'SELL' ? '🔴 SELL' : 'NO SIGNAL';
                signalEl.style.color  = signalValue === 'BUY' ? '#16a34a' : signalValue === 'SELL' ? '#dc2626' : '#0f172a';
                signalEl.style.fontSize = '1.25em';
                strengthEl.textContent = strength === 3 ? 'High Confidence (★★★)' : strength === 2 ? 'Medium Confidence (★★)' : 'Low Confidence (★)';
                reasonEl.textContent   = reasoning.length > 0 ? reasoning.join(' | ') : 'Analyzing price action...';
                panel.style.display    = 'block';
            } catch (err) {
                console.log('Strategy signal error:', err);
                document.getElementById('strategyPanel').style.display = 'none';
            }
        }

        function markActiveButtons() {
            const intervalEl = document.getElementById('intervalSelect');
            if (intervalEl) intervalEl.value = currentInterval;
        }

        function startPolling() {
            if (quotePollTimer) clearInterval(quotePollTimer);
            quotePollTimer = setInterval(async () => {
                updateMarketPill();
                if (!selectedItem) return;

                if (liveStreamState !== 'connected' || !isIndianMarketOpen()) {
                    await refreshQuote();
                }

                if (isIndianMarketOpen()) {
                    await loadSelectedInstrument({ preserveRange: true });
                } else if (liveStreamState === 'disconnected' || liveStreamState === 'reconnecting') {
                    connectLiveStream();
                }
            }, 120000);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const q = e.target.value.trim();
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => fetchSuggestions(q), 220);
        });

        document.getElementById('searchInput').addEventListener('keydown', (e) => {
            if (!suggestions.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                activeIndex = (activeIndex + 1) % suggestions.length;
                renderSuggestions();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                activeIndex = (activeIndex - 1 + suggestions.length) % suggestions.length;
                renderSuggestions();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                pickSuggestion(activeIndex >= 0 ? activeIndex : 0);
            } else if (e.key === 'Escape') {
                suggestions = [];
                activeIndex = -1;
                renderSuggestions();
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-card')) {
                suggestions = [];
                activeIndex = -1;
                renderSuggestions();
            }
        });

        document.getElementById('intervalSelect').addEventListener('change', async (e) => {
            currentInterval = e.target.value;
            markActiveButtons();
            saveState();
            await loadSelectedInstrument();
        });

        document.getElementById('addIndicatorBtn').addEventListener('click', () => {
            const type = document.getElementById('indicatorType').value;
            const defaultsByType = {
                EMA:        { type: 'EMA', period: 20, color: '#f59e0b', visible: true },
                SMA:        { type: 'SMA', period: 20, color: '#2563eb', visible: true },
                RSI:        { type: 'RSI', period: 14, color: '#8b5cf6', visible: true },
                MACD:       { type: 'MACD', period: 12, color: '#2563eb', visible: true },
                VWAP:       { type: 'VWAP', period: 1, color: '#0ea5e9', visible: true },
                VWAP_AI:    { type: 'VWAP_AI', roundInterval: 50, slPoints: 10, volMultiplier: 1.0, showPDHL: true, showRounds: true, color: '#f97316', visible: true },
                Bollinger:  { type: 'Bollinger', period: 20, factor: 2, color: '#f59e0b', visible: true },
                Supertrend: { type: 'Supertrend', period: 7, factor: 3, color: '#ef4444', visible: true },
                Trade:      { type: 'Trade', period: 14, strategy: 'EMA_DON_AND2', slPercent: 0.4, rr: 0.8, holdBars: 12, color: '#2563eb', visible: true },
                ADX:        { type: 'ADX', period: 14, color: '#f97316', visible: true },
                ROC:        { type: 'ROC', period: 12, color: '#06b6d4', visible: true },
                Stochastic: { type: 'Stochastic', kPeriod: 14, dPeriod: 3, smooth: 3, color: '#a855f7', visible: true },
                ParabolicSAR: { type: 'ParabolicSAR', step: 0.02, max: 0.2, color: '#f43f5e', visible: true },
                OBV:        { type: 'OBV', period: 1, color: '#10b981', visible: true },
                VPT:        { type: 'VPT', period: 1, color: '#3b82f6', visible: true },
                MFI:        { type: 'MFI', period: 14, color: '#ec4899', visible: true },
                CMF:        { type: 'CMF', period: 20, color: '#84cc16', visible: true },
                ADLine:     { type: 'ADLine', period: 1, color: '#f59e0b', visible: true },
                EOM:        { type: 'EOM', period: 14, color: '#6366f1', visible: true },
                Keltner:    { type: 'Keltner', period: 20, atrPeriod: 10, factor: 2, color: '#14b8a6', visible: true },
                Donchian:   { type: 'Donchian', period: 20, color: '#fb923c', visible: true },
                ATR:        { type: 'ATR', period: 14, color: '#64748b', visible: true },
            };
            const defaults = defaultsByType[type] || defaultsByType.EMA;
            indicators.push({ id: crypto.randomUUID(), ...defaults });
            saveState(); renderIndicators(); renderChartFromData({ keepRange: true });
        });

        window.addEventListener('load', async () => {
            loadState();
            chartShellEl = document.querySelector('.chart-shell');
            initCharts();
            renderWatchlist();
            renderIndicators();
            markActiveButtons();
            updateMarketPill();
            checkTokenAndShowBanner();
            if (watchlist.length) {
                connectLiveStream();
            }
            if (selectedItem) {
                await loadSelectedInstrument();
            }
            startPolling();
        });

        document.getElementById('ohlcToggleBtn').addEventListener('click', () => {
            ohlcEnabled = !ohlcEnabled;
            const btn = document.getElementById('ohlcToggleBtn');
            btn.className = ohlcEnabled ? 'tool-btn ohlc-on' : 'tool-btn ohlc-off';
            btn.textContent = ohlcEnabled ? 'OHLC' : 'OHLC off';
            if (!ohlcEnabled) document.getElementById('ohlcTooltip').style.display = 'none';
        });

        // Close indicator popup when clicking outside
        document.addEventListener('click', (e) => {
            if (activePopupId && !e.target.closest('#indicatorPopup') && !e.target.closest('.ind-badge')) {
                closeIndicatorPopup();
            }
        });

        document.getElementById('zoomInBtn').addEventListener('click', () => zoomChart(0.8));
        document.getElementById('zoomOutBtn').addEventListener('click', () => zoomChart(1.25));
        document.getElementById('fullscreenChartBtn').addEventListener('click', async () => {
            try {
                await toggleChartFullscreen();
            } catch (_err) {
            }
        });
        document.addEventListener('fullscreenchange', updateFullscreenButton);

        document.getElementById('toggleWatchlistBtn').addEventListener('click', () => {
            watchlistCollapsed = !watchlistCollapsed;
            syncWatchlistLayout();
            saveState();
        });

        window.addEventListener('beforeunload', () => {
            if (quotePollTimer) clearInterval(quotePollTimer);
            if (lazyLoadDebounceTimer) clearTimeout(lazyLoadDebounceTimer);
            disconnectLiveStream();
        });
    </script>
</body>
</html>
