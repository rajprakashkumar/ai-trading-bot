        function toChartTime(isoString) {
            return Math.floor(new Date(isoString).getTime() / 1000);
        }

        function computeEMA(points, period) {
            if (!points.length) return [];
            const k = 2 / (period + 1);
            let ema = points[0].close;
            return points.map((p, idx) => {
                ema = idx === 0 ? p.close : (p.close * k) + (ema * (1 - k));
                return { time: toChartTime(p.time), value: ema };
            });
        }

        function computeSMA(points, period) {
            if (points.length < period) return [];
            const result = [];
            let sum = 0;
            for (let i = 0; i < points.length; i += 1) {
                sum += points[i].close;
                if (i >= period) sum -= points[i - period].close;
                if (i >= period - 1) {
                    result.push({ time: toChartTime(points[i].time), value: sum / period });
                }
            }
            return result;
        }

        function computeSupertrend(points, period, multiplier) {
            if (points.length < period + 2) return { up: [], down: [], markers: [] };

            const tr = [];
            for (let i = 0; i < points.length; i += 1) {
                if (i === 0) {
                    tr.push(points[i].high - points[i].low);
                    continue;
                }
                const current = points[i];
                const prevClose = points[i - 1].close;
                tr.push(Math.max(
                    current.high - current.low,
                    Math.abs(current.high - prevClose),
                    Math.abs(current.low - prevClose)
                ));
            }

            const atr = [];
            let atrSum = 0;
            for (let i = 0; i < tr.length; i += 1) {
                atrSum += tr[i];
                if (i < period - 1) {
                    atr.push(null);
                    continue;
                }
                if (i === period - 1) {
                    atr.push(atrSum / period);
                } else {
                    atr.push(((atr[i - 1] * (period - 1)) + tr[i]) / period);
                }
            }

            const finalUpper = [];
            const finalLower = [];
            const trend = [];
            const direction = [];
            const up = [];
            const down = [];
            const markers = [];

            for (let i = 0; i < points.length; i += 1) {
                const time = toChartTime(points[i].time);
                if (atr[i] == null) {
                    up.push({ time });
                    down.push({ time });
                    continue;
                }

                const hl2 = (points[i].high + points[i].low) / 2;
                const basicUpper = hl2 + multiplier * atr[i];
                const basicLower = hl2 - multiplier * atr[i];

                if (i > 0 && finalUpper[i - 1] != null) {
                    finalUpper[i] = (basicUpper < finalUpper[i - 1] || points[i - 1].close > finalUpper[i - 1]) ? basicUpper : finalUpper[i - 1];
                    finalLower[i] = (basicLower > finalLower[i - 1] || points[i - 1].close < finalLower[i - 1]) ? basicLower : finalLower[i - 1];
                } else {
                    finalUpper[i] = basicUpper;
                    finalLower[i] = basicLower;
                }

                if (i === 0 || trend[i - 1] == null) {
                    trend[i] = finalUpper[i];
                    direction[i] = -1;
                } else if (trend[i - 1] === finalUpper[i - 1]) {
                    if (points[i].close <= finalUpper[i]) {
                        trend[i] = finalUpper[i];
                        direction[i] = -1;
                    } else {
                        trend[i] = finalLower[i];
                        direction[i] = 1;
                    }
                } else {
                    if (points[i].close >= finalLower[i]) {
                        trend[i] = finalLower[i];
                        direction[i] = 1;
                    } else {
                        trend[i] = finalUpper[i];
                        direction[i] = -1;
                    }
                }

                if (direction[i] === 1) {
                    up.push({ time, value: trend[i] });
                    down.push({ time });
                } else {
                    up.push({ time });
                    down.push({ time, value: trend[i] });
                }

                if (i > 0 && direction[i - 1] != null && direction[i] !== direction[i - 1]) {
                    markers.push({
                        time,
                        position: direction[i] === 1 ? 'belowBar' : 'aboveBar',
                        color: direction[i] === 1 ? '#16a34a' : '#ef4444',
                        shape: direction[i] === 1 ? 'arrowUp' : 'arrowDown'
                    });
                }
            }

            return { up, down, markers };
        }

        function computeRSI(points, period) {
            if (points.length < period + 1) return [];
            const result = [];
            let gains = 0;
            let losses = 0;

            for (let i = 1; i <= period; i += 1) {
                const diff = points[i].close - points[i - 1].close;
                if (diff >= 0) gains += diff;
                else losses -= diff;
            }

            let avgGain = gains / period;
            let avgLoss = losses / period;

            for (let i = period; i < points.length; i += 1) {
                if (i > period) {
                    const diff = points[i].close - points[i - 1].close;
                    const gain = diff > 0 ? diff : 0;
                    const loss = diff < 0 ? -diff : 0;
                    avgGain = ((avgGain * (period - 1)) + gain) / period;
                    avgLoss = ((avgLoss * (period - 1)) + loss) / period;
                }
                const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
                const rsi = avgLoss === 0 ? 100 : 100 - (100 / (1 + rs));
                result.push({ time: toChartTime(points[i].time), value: rsi });
            }
            return result;
        }

        function computeVWAP(points) {
            let cumulativePV = 0;
            let cumulativeVolume = 0;
            return points.map((p) => {
                const typical = (p.high + p.low + p.close) / 3;
                const volume = Number(p.volume || 0);
                cumulativePV += typical * volume;
                cumulativeVolume += volume;
                return {
                    time: toChartTime(p.time),
                    value: cumulativeVolume ? cumulativePV / cumulativeVolume : p.close
                };
            });
        }

        // ── VWAP AI: Daily-reset VWAP (resets every 9:15 AM IST) ─────────────────
        function computeVWAP_DailyReset(points) {
            let cumPV = 0, cumVol = 0, lastDayKey = null;
            return points.map(p => {
                const ist = getIstParts(new Date(p.time));
                const dk = `${ist.year}-${pad2(ist.month)}-${pad2(ist.day)}`;
                if (dk !== lastDayKey) { cumPV = 0; cumVol = 0; lastDayKey = dk; }
                const typical = (Number(p.high) + Number(p.low) + Number(p.close)) / 3;
                const vol = Number(p.volume || 0);
                cumPV += typical * vol;
                cumVol += vol;
                return { time: toChartTime(p.time), value: cumVol > 0 ? cumPV / cumVol : Number(p.close) };
            });
        }

        // ── VWAP AI: Previous Day High/Low per candle ─────────────────────────────
        function computePDHL(points) {
            const dayMap = new Map();
            const dayOrder = [];
            points.forEach(p => {
                const ist = getIstParts(new Date(p.time));
                const dk = `${ist.year}-${pad2(ist.month)}-${pad2(ist.day)}`;
                if (!dayMap.has(dk)) {
                    dayMap.set(dk, { high: Number(p.high), low: Number(p.low) });
                    dayOrder.push(dk);
                } else {
                    const d = dayMap.get(dk);
                    d.high = Math.max(d.high, Number(p.high));
                    d.low  = Math.min(d.low,  Number(p.low));
                }
            });
            const pdhMap = new Map(), pdlMap = new Map();
            points.forEach(p => {
                const ist = getIstParts(new Date(p.time));
                const dk = `${ist.year}-${pad2(ist.month)}-${pad2(ist.day)}`;
                const idx = dayOrder.indexOf(dk);
                if (idx > 0) {
                    const prev = dayMap.get(dayOrder[idx - 1]);
                    const t = toChartTime(p.time);
                    pdhMap.set(t, prev.high);
                    pdlMap.set(t, prev.low);
                }
            });
            const pdLines = [];
            if (dayOrder.length > 1) {
                const prev = dayMap.get(dayOrder[dayOrder.length - 2]);
                const t0 = toChartTime(points[0].time);
                const t1 = toChartTime(points[points.length - 1].time);
                pdLines.push({ type: 'PDH', value: prev.high, data: [{ time: t0, value: prev.high }, { time: t1, value: prev.high }] });
                pdLines.push({ type: 'PDL', value: prev.low,  data: [{ time: t0, value: prev.low  }, { time: t1, value: prev.low  }] });
            }
            return { pdhMap, pdlMap, pdLines };
        }

        // ── VWAP AI: Psychological round number levels ─────────────────────────────
        function computeRoundLevels(points, interval) {
            if (!points.length || interval <= 0) return [];
            const prices = points.map(p => Number(p.close));
            const lo = Math.min(...prices), hi = Math.max(...prices);
            const margin = (hi - lo) * 0.05;
            const levels = [];
            for (let v = Math.ceil((lo - margin) / interval) * interval; v <= hi + margin; v += interval)
                levels.push(Math.round(v * 100) / 100);
            return levels;
        }

        // ── VWAP AI: N-candle average volume ──────────────────────────────────────
        function computeVolAvg10(points, period) {
            period = period || 10;
            return points.map((p, i) => {
                if (i < period - 1) return 0;
                let sum = 0;
                for (let j = i - period + 1; j <= i; j++) sum += Number(points[j].volume || 0);
                return sum / period;
            });
        }

        // ── VWAP AI: Core signal detection ────────────────────────────────────────
        // Rules: price vs VWAP, strong candle (body ≥55% of range), volume > avg,
        // level breakout/bounce or rejection, fakeout filter (upper/lower wick < 40% body)
        function detectVWAPAISignals(points, vwapData, pdhMap, pdlMap, roundLevels, volAvg, slPoints, volMult) {
            const signals = [];
            const vwapMap = new Map(vwapData.map(d => [d.time, d.value]));
            for (let i = 10; i < points.length; i++) {
                const p = points[i], prev = points[i - 1];
                const t = toChartTime(p.time);
                const close = Number(p.close), open = Number(p.open);
                const high  = Number(p.high),  low  = Number(p.low);
                const vol   = Number(p.volume || 0);
                const vwapVal = vwapMap.get(t);
                if (vwapVal == null) continue;
                const range = high - low;
                if (range < 0.01) continue;
                const body = Math.abs(close - open);
                const bodyRatio = body / range;
                const isGreen = close > open, isRed = close < open;
                const avgVol = volAvg[i];
                const volOk = avgVol > 0 && vol >= avgVol * volMult;
                const strongCandle = bodyRatio >= 0.55;
                const pdhVal = pdhMap.get(t), pdlVal = pdlMap.get(t);
                const prevHigh = Number(prev.high), prevLow = Number(prev.low);

                // ── Bullish / CE ──
                if (isGreen && close > vwapVal && strongCandle && volOk) {
                    let setup = null;
                    if (pdhVal && open <= pdhVal && close > pdhVal)                          setup = `PDH BO ${pdhVal.toFixed(0)}`;
                    if (!setup) { const b = roundLevels.find(r => open <= r && close > r && r > vwapVal); if (b) setup = `Rd ${b} BO`; }
                    if (!setup && prevLow <= vwapVal * 1.002 && close > vwapVal * 1.002)      setup = 'VWAP Bounce';
                    if (!setup && pdlVal && prevLow <= pdlVal * 1.003 && close > pdlVal)      setup = `PDL ${pdlVal.toFixed(0)} Bounce`;
                    if (!setup) { const s = roundLevels.find(r => prevLow <= r * 1.002 && close > r); if (s) setup = `Rd ${s} Bounce`; }
                    if (setup && (high - close) <= body * 0.4) {
                        const nextRes = roundLevels.filter(r => r > close).sort((a,b) => a - b)[0];
                        const tgt = (pdhVal && pdhVal > close)
                            ? Math.min(pdhVal, nextRes || pdhVal)
                            : (nextRes || close + slPoints * 2);
                        signals.push({ time: t, side: 1,  entry: close, stop: low  - slPoints, target: tgt, setup, vwap: vwapVal, vol, avgVol });
                    }
                }

                // ── Bearish / PE ──
                if (isRed && close < vwapVal && strongCandle && volOk) {
                    let setup = null;
                    if (pdlVal && open >= pdlVal && close < pdlVal)                           setup = `PDL BD ${pdlVal.toFixed(0)}`;
                    if (!setup) { const b = roundLevels.find(r => open >= r && close < r && r < vwapVal); if (b) setup = `Rd ${b} BD`; }
                    if (!setup && prevHigh >= vwapVal * 0.998 && close < vwapVal * 0.998)     setup = 'VWAP Rejection';
                    if (!setup && pdhVal && prevHigh >= pdhVal * 0.997 && close < pdhVal)     setup = `PDH ${pdhVal.toFixed(0)} Rejection`;
                    if (!setup) { const r = roundLevels.find(rv => prevHigh >= rv * 0.998 && close < rv); if (r) setup = `Rd ${r} Rejection`; }
                    if (setup && (close - low) <= body * 0.4) {
                        const nextSup = roundLevels.filter(r => r < close).sort((a,b) => b - a)[0];
                        const tgt = (pdlVal && pdlVal < close)
                            ? Math.max(pdlVal, nextSup || pdlVal)
                            : (nextSup || close - slPoints * 2);
                        signals.push({ time: t, side: -1, entry: close, stop: high + slPoints, target: tgt, setup, vwap: vwapVal, vol, avgVol });
                    }
                }
            }
            return signals;
        }

        // ── VWAP AI: Time-decay risk (3 consecutive sideways candles after entry) ──
        function checkTimeDecayRisk(pts) {
            if (pts.length < 3) return false;
            const last3 = pts.slice(-3);
            const hi = Math.max(...last3.map(p => Number(p.high)));
            const lo = Math.min(...last3.map(p => Number(p.low)));
            const mid = (hi + lo) / 2;
            return mid > 0 && (hi - lo) / mid < 0.0015; // < 0.15% range = sideways
        }

        // ── Helper: Wilder smoothing (used by ATR, ADX) ──────────────────────────
        function wilderSmooth(values, period) {
            const out = new Array(values.length).fill(null);
            if (values.length < period) return out;
            let sum = 0;
            for (let i = 0; i < period; i++) sum += values[i];
            out[period - 1] = sum / period;
            for (let i = period; i < values.length; i++) {
                out[i] = (out[i - 1] * (period - 1) + values[i]) / period;
            }
            return out;
        }

        // ── ATR ──────────────────────────────────────────────────────────────────
        function computeATR(points, period = 14) {
            if (points.length < 2) return [];
            const tr = points.map((p, i) => {
                if (i === 0) return Number(p.high) - Number(p.low);
                const h = Number(p.high), l = Number(p.low), pc = Number(points[i - 1].close);
                return Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
            });
            const atr = wilderSmooth(tr, period);
            return points.map((p, i) => atr[i] == null ? null : { time: toChartTime(p.time), value: atr[i] }).filter(Boolean);
        }

        // ── ADX (+DI, -DI) ───────────────────────────────────────────────────────
        function computeADX(points, period = 14) {
            if (points.length < period + 2) return { adx: [], plusDI: [], minusDI: [] };
            const plusDMArr = [], minusDMArr = [], trArr = [];
            for (let i = 0; i < points.length; i++) {
                if (i === 0) { plusDMArr.push(0); minusDMArr.push(0); trArr.push(Number(points[i].high) - Number(points[i].low)); continue; }
                const h = Number(points[i].high), l = Number(points[i].low);
                const ph = Number(points[i - 1].high), pl = Number(points[i - 1].low), pc = Number(points[i - 1].close);
                const up = h - ph, dn = pl - l;
                plusDMArr.push(up > dn && up > 0 ? up : 0);
                minusDMArr.push(dn > up && dn > 0 ? dn : 0);
                trArr.push(Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc)));
            }
            const sTR = wilderSmooth(trArr, period);
            const sPDM = wilderSmooth(plusDMArr, period);
            const sMDM = wilderSmooth(minusDMArr, period);
            const pdiArr = [], mdiArr = [], dxArr = [];
            for (let i = 0; i < points.length; i++) {
                if (sTR[i] == null) { pdiArr.push(null); mdiArr.push(null); dxArr.push(null); continue; }
                const pdi = sTR[i] > 0 ? (sPDM[i] / sTR[i]) * 100 : 0;
                const mdi = sTR[i] > 0 ? (sMDM[i] / sTR[i]) * 100 : 0;
                pdiArr.push(pdi); mdiArr.push(mdi);
                const s = pdi + mdi; dxArr.push(s > 0 ? Math.abs(pdi - mdi) / s * 100 : 0);
            }
            const adxArr = wilderSmooth(dxArr.map(v => v ?? 0), period);
            return {
                adx: points.map((p, i) => ({ time: toChartTime(p.time), value: adxArr[i] ?? 0 })),
                plusDI: points.map((p, i) => ({ time: toChartTime(p.time), value: pdiArr[i] ?? 0 })),
                minusDI: points.map((p, i) => ({ time: toChartTime(p.time), value: mdiArr[i] ?? 0 }))
            };
        }

        // ── ROC ──────────────────────────────────────────────────────────────────
        function computeROC(points, period = 12) {
            return points.map((p, i) => {
                if (i < period) return null;
                const prev = Number(points[i - period].close);
                return prev === 0 ? null : { time: toChartTime(p.time), value: (Number(p.close) - prev) / prev * 100 };
            }).filter(Boolean);
        }

        // ── Stochastic (%K/%D) ───────────────────────────────────────────────────
        function computeStochastic(points, kPeriod = 14, dPeriod = 3, smooth = 3) {
            // Compute raw %K
            const rawKValues = [];
            for (let i = 0; i < points.length; i++) {
                if (i < kPeriod - 1) {
                    rawKValues.push(50); // Default for early values
                } else {
                    const sl = points.slice(i - kPeriod + 1, i + 1);
                    const lo = Math.min(...sl.map(s => Number(s.low)));
                    const hi = Math.max(...sl.map(s => Number(s.high)));
                    const range = hi - lo;
                    rawKValues.push(range === 0 ? 50 : (Number(points[i].close) - lo) / range * 100);
                }
            }
            
            // Smooth %K
            const smoothedKValues = [];
            for (let i = 0; i < rawKValues.length; i++) {
                if (i < smooth - 1) {
                    smoothedKValues.push(50);
                } else {
                    const sum = rawKValues.slice(i - smooth + 1, i + 1).reduce((a, b) => a + b, 0);
                    smoothedKValues.push(sum / smooth);
                }
            }
            
            // Compute %D (smoothed %K)
            const dValues = [];
            for (let i = 0; i < smoothedKValues.length; i++) {
                if (i < dPeriod - 1) {
                    dValues.push(50);
                } else {
                    const sum = smoothedKValues.slice(i - dPeriod + 1, i + 1).reduce((a, b) => a + b, 0);
                    dValues.push(sum / dPeriod);
                }
            }
            
            // Return as time-indexed objects
            const k = points.map((p, i) => ({ time: toChartTime(p.time), value: smoothedKValues[i] }));
            const d = points.map((p, i) => ({ time: toChartTime(p.time), value: dValues[i] }));
            return { k, d };
        }

        // ── Parabolic SAR ────────────────────────────────────────────────────────
        function computeParabolicSAR(points, step = 0.02, maxAcc = 0.2) {
            if (points.length < 2) return [];
            let trend = 1, sar = Number(points[0].low), ep = Number(points[0].high), acc = step;
            const result = [];
            for (let i = 1; i < points.length; i++) {
                const h = Number(points[i].high), l = Number(points[i].low);
                let newSar = sar + acc * (ep - sar);
                if (trend === 1) {
                    newSar = Math.min(newSar, Number(points[Math.max(0, i - 1)].low), Number(points[Math.max(0, i - 2)].low));
                    if (l < newSar) { trend = -1; newSar = ep; ep = l; acc = step; }
                    else if (h > ep) { ep = h; acc = Math.min(acc + step, maxAcc); }
                } else {
                    newSar = Math.max(newSar, Number(points[Math.max(0, i - 1)].high), Number(points[Math.max(0, i - 2)].high));
                    if (h > newSar) { trend = 1; newSar = ep; ep = h; acc = step; }
                    else if (l < ep) { ep = l; acc = Math.min(acc + step, maxAcc); }
                }
                sar = newSar;
                result.push({ time: toChartTime(points[i].time), value: sar });
            }
            return result;
        }

        // ── OBV ──────────────────────────────────────────────────────────────────
        function computeOBV(points) {
            let obv = 0;
            return points.map((p, i) => {
                if (i > 0) {
                    const vol = Number(p.volume || 0);
                    if (Number(p.close) > Number(points[i - 1].close)) obv += vol;
                    else if (Number(p.close) < Number(points[i - 1].close)) obv -= vol;
                }
                return { time: toChartTime(p.time), value: obv };
            });
        }

        // ── VPT ──────────────────────────────────────────────────────────────────
        function computeVPT(points) {
            let vpt = 0;
            return points.map((p, i) => {
                if (i > 0) {
                    const pc = Number(points[i - 1].close);
                    if (pc > 0) vpt += Number(p.volume || 0) * (Number(p.close) - pc) / pc;
                }
                return { time: toChartTime(p.time), value: vpt };
            });
        }

        // ── MFI ──────────────────────────────────────────────────────────────────
        function computeMFI(points, period = 14) {
            return points.map((p, i) => {
                if (i < period) return null;
                let pos = 0, neg = 0;
                for (let j = i - period + 1; j <= i; j++) {
                    const tp = (Number(points[j].high) + Number(points[j].low) + Number(points[j].close)) / 3;
                    const ptp = j > 0 ? (Number(points[j-1].high) + Number(points[j-1].low) + Number(points[j-1].close)) / 3 : tp;
                    const mf = tp * Number(points[j].volume || 0);
                    if (tp >= ptp) pos += mf; else neg += mf;
                }
                const mfr = neg === 0 ? 100 : pos / neg;
                return { time: toChartTime(p.time), value: 100 - (100 / (1 + mfr)) };
            }).filter(Boolean);
        }

        // ── CMF ──────────────────────────────────────────────────────────────────
        function computeCMF(points, period = 20) {
            return points.map((p, i) => {
                if (i < period - 1) return null;
                let mfvSum = 0, volSum = 0;
                for (let j = i - period + 1; j <= i; j++) {
                    const h = Number(points[j].high), l = Number(points[j].low), c = Number(points[j].close);
                    const vol = Number(points[j].volume || 0);
                    const rng = h - l;
                    mfvSum += rng === 0 ? 0 : ((c - l) - (h - c)) / rng * vol;
                    volSum += vol;
                }
                return { time: toChartTime(p.time), value: volSum === 0 ? 0 : mfvSum / volSum };
            }).filter(Boolean);
        }

        // ── A/D Line ─────────────────────────────────────────────────────────────
        function computeADLine(points) {
            let ad = 0;
            return points.map((p) => {
                const h = Number(p.high), l = Number(p.low), c = Number(p.close);
                const rng = h - l;
                ad += rng === 0 ? 0 : ((c - l) - (h - c)) / rng * Number(p.volume || 0);
                return { time: toChartTime(p.time), value: ad };
            });
        }

        // ── EOM ──────────────────────────────────────────────────────────────────
        function computeEOM(points, period = 14) {
            const emv = points.map((p, i) => {
                if (i === 0) return 0;
                const midMove = ((Number(p.high) + Number(p.low)) / 2) - ((Number(points[i-1].high) + Number(points[i-1].low)) / 2);
                const boxRatio = (Number(p.volume || 1) / 1e7) / Math.max(0.0001, Number(p.high) - Number(p.low));
                return boxRatio === 0 ? 0 : midMove / boxRatio;
            });
            return points.map((p, i) => {
                if (i < period - 1) return null;
                return { time: toChartTime(p.time), value: emv.slice(i - period + 1, i + 1).reduce((s, v) => s + v, 0) / period };
            }).filter(Boolean);
        }

        // ── Keltner Channel ──────────────────────────────────────────────────────
        function computeKeltner(points, emaPeriod = 20, atrPeriod = 10, multiplier = 2) {
            const midData = computeEMA(points, emaPeriod);
            const atrData = computeATR(points, atrPeriod);
            const midMap = new Map(midData.map(d => [d.time, d.value]));
            const atrMap = new Map(atrData.map(d => [d.time, d.value]));
            const upper = [], lower = [], middle = [];
            points.forEach(p => {
                const t = toChartTime(p.time);
                const m = midMap.get(t), a = atrMap.get(t);
                if (m == null || a == null) return;
                middle.push({ time: t, value: m });
                upper.push({ time: t, value: m + multiplier * a });
                lower.push({ time: t, value: m - multiplier * a });
            });
            return { upper, middle, lower };
        }

        // ── Donchian Channel ─────────────────────────────────────────────────────
        function computeDonchian(points, period = 20) {
            const upper = [], lower = [], middle = [];
            points.forEach((p, i) => {
                if (i < period - 1) return;
                const sl = points.slice(i - period + 1, i + 1);
                const h = Math.max(...sl.map(s => Number(s.high)));
                const l = Math.min(...sl.map(s => Number(s.low)));
                const t = toChartTime(p.time);
                upper.push({ time: t, value: h });
                lower.push({ time: t, value: l });
                middle.push({ time: t, value: (h + l) / 2 });
            });
            return { upper, middle, lower };
        }

        // ── OHLC crosshair time formatter ────────────────────────────────────────
        function formatCrosshairTime(timeValue) {
            const date = new Date(Number(timeValue) * 1000);
            const parts = getIstParts(date);
            if (currentInterval === 'day') return `${pad2(parts.day)}/${pad2(parts.month)}/${parts.year}`;
            return `${pad2(parts.day)}/${pad2(parts.month)} ${pad2(parts.hour)}:${pad2(parts.minute)} IST`;
        }

        function computeBollinger(points, period, multiplier) {
            if (points.length < period) return { basis: [], upper: [], lower: [] };
            const basis = [];
            const upper = [];
            const lower = [];
            for (let i = period - 1; i < points.length; i += 1) {
                const window = points.slice(i - period + 1, i + 1).map((p) => p.close);
                const mean = window.reduce((sum, value) => sum + value, 0) / period;
                const variance = window.reduce((sum, value) => sum + ((value - mean) ** 2), 0) / period;
                const stdDev = Math.sqrt(variance);
                const time = toChartTime(points[i].time);
                basis.push({ time, value: mean });
                upper.push({ time, value: mean + multiplier * stdDev });
                lower.push({ time, value: mean - multiplier * stdDev });
            }
            return { basis, upper, lower };
        }

        function computeMACD(points, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
            if (points.length < slowPeriod + signalPeriod) return { macd: [], signal: [], histogram: [] };
            const fast = computeEMA(points, fastPeriod);
            const slow = computeEMA(points, slowPeriod);
            const fastMap = new Map(fast.map((p) => [p.time, p.value]));
            const slowMap = new Map(slow.map((p) => [p.time, p.value]));
            const macdBase = [];

            points.forEach((p) => {
                const time = toChartTime(p.time);
                if (fastMap.has(time) && slowMap.has(time)) {
                    macdBase.push({ time, value: fastMap.get(time) - slowMap.get(time) });
                }
            });

            if (macdBase.length < signalPeriod) return { macd: macdBase, signal: [], histogram: [] };

            const k = 2 / (signalPeriod + 1);
            let ema = macdBase[0].value;
            const signal = macdBase.map((point, idx) => {
                ema = idx === 0 ? point.value : (point.value * k) + (ema * (1 - k));
                return { time: point.time, value: ema };
            });

            const signalMap = new Map(signal.map((p) => [p.time, p.value]));
            const histogram = macdBase.map((point) => ({
                time: point.time,
                value: point.value - (signalMap.get(point.time) || 0),
                color: point.value - (signalMap.get(point.time) || 0) >= 0 ? '#16a34a' : '#dc2626'
            }));

            return { macd: macdBase, signal, histogram };
        }

        function computeDonchianSignal(points, period = 20) {
            const signal = new Array(points.length).fill(0);
            for (let i = period; i < points.length; i += 1) {
                const high = Math.max(...points.slice(i - period, i).map((p) => Number(p.high)));
                const low = Math.min(...points.slice(i - period, i).map((p) => Number(p.low)));
                const close = Number(points[i].close);
                if (close > high) signal[i] = 1;
                else if (close < low) signal[i] = -1;
            }
            return signal;
        }

        function computeBollingerSignal(points, period = 14, k = 2.2) {
            const signal = new Array(points.length).fill(0);
            if (points.length < period) return signal;
            for (let i = period - 1; i < points.length; i += 1) {
                const window = points.slice(i - period + 1, i + 1).map((p) => Number(p.close));
                const mean = window.reduce((sum, v) => sum + v, 0) / period;
                const variance = window.reduce((sum, v) => sum + ((v - mean) ** 2), 0) / period;
                const std = Math.sqrt(variance);
                const upper = mean + (k * std);
                const lower = mean - (k * std);
                const close = Number(points[i].close);
                if (close < lower) signal[i] = 1;
                else if (close > upper) signal[i] = -1;
            }
            return signal;
        }

        function computeRsiReversionSignal(points, period = 14, low = 30, high = 70) {
            const signal = new Array(points.length).fill(0);
            const series = computeRSI(points, period);
            const map = new Map(series.map((r) => [r.time, r.value]));
            points.forEach((p, i) => {
                const r = map.get(toChartTime(p.time));
                if (r == null) return;
                if (r <= low) signal[i] = 1;
                else if (r >= high) signal[i] = -1;
            });
            return signal;
        }

        function computeEmaCrossSignal(points, fast = 20, slow = 50) {
            const signal = new Array(points.length).fill(0);
            const f = computeEMA(points, fast);
            const s = computeEMA(points, slow);
            const fMap = new Map(f.map((x) => [x.time, x.value]));
            const sMap = new Map(s.map((x) => [x.time, x.value]));
            for (let i = 1; i < points.length; i += 1) {
                const t = toChartTime(points[i].time);
                const tPrev = toChartTime(points[i - 1].time);
                const fNow = fMap.get(t);
                const sNow = sMap.get(t);
                const fPrev = fMap.get(tPrev);
                const sPrev = sMap.get(tPrev);
                if ([fNow, sNow, fPrev, sPrev].some((v) => v == null)) continue;
                if (fPrev <= sPrev && fNow > sNow) signal[i] = 1;
                else if (fPrev >= sPrev && fNow < sNow) signal[i] = -1;
            }
            return signal;
        }

        function computeTradeComboSignal(points, strategyName) {
            const ema = computeEmaCrossSignal(points, 20, 50);
            const don = computeDonchianSignal(points, 20);
            const rsi = computeRsiReversionSignal(points, 14, 30, 70);
            const boll = computeBollingerSignal(points, 14, 2.2);
            const out = new Array(points.length).fill(0);

            if (strategyName === 'BB_EMA_MOM') {
                // 83% Win Rate: BB touch + EMA9/21 alignment + Momentum (≥2 of 3 conditions)
                const ema9data = computeEMA(points, 9);
                const ema21data = computeEMA(points, 21);
                const bb = computeBollinger(points, 20, 2);

                // Build time-keyed maps for O(1) lookup
                const e9Map = new Map(ema9data.map(d => [d.time, d.value]));
                const e21Map = new Map(ema21data.map(d => [d.time, d.value]));
                const bbUpperMap = new Map(bb.upper.map(d => [d.time, d.value]));
                const bbLowerMap = new Map(bb.lower.map(d => [d.time, d.value]));

                for (let i = 5; i < points.length; i++) {
                    const t = toChartTime(points[i].time);
                    const close = points[i].close;
                    const low = points[i].low;
                    const high = points[i].high;
                    const e9 = e9Map.get(t);
                    const e21 = e21Map.get(t);
                    const bbUpper = bbUpperMap.get(t);
                    const bbLower = bbLowerMap.get(t);

                    if (e9 == null || e21 == null || bbUpper == null || bbLower == null) continue;

                    // Momentum: % change over last 5 bars
                    const mom = ((close - points[i - 5].close) / points[i - 5].close) * 100;

                    // BUY: count conditions (≥2 required)
                    let buyCount = 0;
                    if (low <= bbLower * 1.01) buyCount++;   // At lower BB
                    if (e9 > e21) buyCount++;                // EMA bullish alignment
                    if (mom > 0.2) buyCount++;               // Positive momentum

                    // SELL: count conditions (≥2 required)
                    let sellCount = 0;
                    if (high >= bbUpper * 0.99) sellCount++; // At upper BB
                    if (e9 < e21) sellCount++;               // EMA bearish alignment
                    if (mom < -0.2) sellCount++;             // Negative momentum

                    if (buyCount >= 2 && buyCount > sellCount) out[i] = 1;
                    else if (sellCount >= 2 && sellCount > buyCount) out[i] = -1;
                }
                return out;
            }

            if (strategyName === 'ADX_EMA_RSI') {
                // ADX trending (>5) + EMA trend (loosened from AND to OR)
                const { adx } = computeADX(points, 14);
                const adxValueMap = new Map(adx.map(d => [d.time, d.value]));
                
                let signalCount = 0;
                for (let i = 0; i < points.length; i++) {
                    const chartTime = toChartTime(points[i].time);
                    const adxVal = adxValueMap.get(chartTime) ?? 0;
                    if (adxVal < 5) continue; // Drastically lowered threshold
                    if (ema[i] === 1 || rsi[i] === 1) { out[i] = 1; signalCount++; } // Changed to OR
                    else if (ema[i] === -1 || rsi[i] === -1) { out[i] = -1; signalCount++; }
                }
                return out;
            }

            if (strategyName === 'STOCH_BB_EMA') {
                // Simplified: EMA + Bollinger signals (stochastic helps but not required)
                for (let i = 0; i < points.length; i++) {
                    // Allow EMA signal alone, or Bollinger alone, or combination
                    if (ema[i] === 1 || boll[i] === 1) { out[i] = 1; }
                    else if (ema[i] === -1 || boll[i] === -1) { out[i] = -1; }
                }
                return out;
            }

            if (strategyName === 'MULTI_VOTE4') {
                // 2-of-4 vote: EMA cross, Donchian, RSI, Bollinger (lowered from 3)
                for (let i = 0; i < points.length; i++) {
                    const arr = [ema[i], don[i], rsi[i], boll[i]];
                    const bulls = arr.filter(v => v === 1).length;
                    const bears = arr.filter(v => v === -1).length;
                    if (bulls >= 2) out[i] = 1; // Lowered from 3 for more signals
                    else if (bears >= 2) out[i] = -1;
                }
                return out;
            }

            if (strategyName === 'STRONG_TREND') {
                // ADX > 15 (strong trend) + Donchian breakout + EMA aligned (lowered from 25)
                const { adx } = computeADX(points, 14);
                const adxValueMap = new Map(adx.map(d => [d.time, d.value]));
                
                for (let i = 0; i < points.length; i++) {
                    const chartTime = toChartTime(points[i].time);
                    const adxVal = adxValueMap.get(chartTime) ?? 0;
                    if (adxVal < 15) continue; // Lowered from 25
                    if (don[i] === 1 && ema[i] === 1) out[i] = 1;
                    else if (don[i] === -1 && ema[i] === -1) out[i] = -1;
                }
                return out;
            }

            for (let i = 0; i < points.length; i += 1) {
                if (strategyName === 'EMA_DON_AND2') {
                    if (ema[i] === 1 && don[i] === 1) out[i] = 1;
                    else if (ema[i] === -1 && don[i] === -1) out[i] = -1;
                } else {
                    if (rsi[i] === 1 && boll[i] === 1) out[i] = 1;
                    else if (rsi[i] === -1 && boll[i] === -1) out[i] = -1;
                }
            }
            return out;
        }

        function simulateTradeMarkers(points, signal, slPercent, rr, holdBars, color) {
            const markers = [];
            const stopLines = [];
            const targetLines = [];
            const signalsByTime = new Map();
            const slPct = Math.max(0.05, Number(slPercent || 0.4)) / 100;
            const maxHold = Math.max(1, Number(holdBars || 12));
            const rrValue = Math.max(0.1, Number(rr || 0.8));

            let i = 1;
            while (i < points.length - 1) {
                const side = signal[i];
                if (!side) {
                    i += 1;
                    continue;
                }

                const entryIndex = i + 1;
                if (entryIndex >= points.length) break;

                const entry = Number(points[entryIndex].open);
                const entryTime = toChartTime(points[entryIndex].time);
                const stop = side === 1 ? entry * (1 - slPct) : entry * (1 + slPct);
                const target = side === 1 ? entry * (1 + slPct * rrValue) : entry * (1 - slPct * rrValue);

                let exitIndex = Math.min(entryIndex + maxHold, points.length - 1);
                let exitReason = 'TIME';

                for (let j = entryIndex; j <= Math.min(entryIndex + maxHold, points.length - 1); j += 1) {
                    const bar = points[j];
                    if (side === 1) {
                        if (Number(bar.low) <= stop) {
                            exitIndex = j;
                            exitReason = 'SL';
                            break;
                        }
                        if (Number(bar.high) >= target) {
                            exitIndex = j;
                            exitReason = 'TP';
                            break;
                        }
                    } else {
                        if (Number(bar.high) >= stop) {
                            exitIndex = j;
                            exitReason = 'SL';
                            break;
                        }
                        if (Number(bar.low) <= target) {
                            exitIndex = j;
                            exitReason = 'TP';
                            break;
                        }
                    }
                }

                const exitTime = toChartTime(points[exitIndex].time);
                stopLines.push([
                    { time: entryTime, value: stop },
                    { time: exitTime, value: stop }
                ]);
                targetLines.push([
                    { time: entryTime, value: target },
                    { time: exitTime, value: target }
                ]);

                // Main entry marker - make it more visible
                markers.push({
                    time: entryTime,
                    position: side === 1 ? 'belowBar' : 'aboveBar',
                    color: color || '#2563eb',
                    shape: side === 1 ? 'arrowUp' : 'arrowDown',
                    text: side === 1 ? 'Entry' : 'Exit',
                    size: 3
                });

                // Exit marker
                markers.push({
                    time: exitTime,
                    position: exitReason === 'SL' ? (side === 1 ? 'belowBar' : 'aboveBar') : (side === 1 ? 'aboveBar' : 'belowBar'),
                    color: exitReason === 'SL' ? '#dc2626' : '#16a34a',
                    shape: exitReason === 'SL' ? 'circle' : 'square',
                    text: exitReason,
                    size: 2
                });

                // Record signal info for crosshair tooltip lookup
                const exitPrice = exitReason === 'SL' ? stop : exitReason === 'TP' ? target : Number(points[exitIndex].close);
                signalsByTime.set(entryTime, { kind: 'entry', side, entry, stop, target });
                // Only write exit if it's a different candle than entry
                if (exitTime !== entryTime) {
                    signalsByTime.set(exitTime, { kind: 'exit', side, exitReason, exitPrice, entry, stop, target });
                }

                i = Math.max(i + 1, exitIndex);
            }

            return { markers, stopLines, targetLines, signalsByTime, signalsByTime };
        }
